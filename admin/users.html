<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Manage Users - Islamic Library by Shekh</title>

    <!-- Favicon -->
    <link rel="icon" href="hikmahadminlogo.png">

    <!-- Open Graph -->
    <meta property="og:title" content="Admin Dashboard - Islamic Library by Shekh ">
    <meta property="og:description" content="Admin Dashboard for managing Islamic Library by Shekh">
    <meta property="og:image" content="hikmahadminlogo.png">
    <meta property="og:url" content="https://islamiclibraryy.github.io/Resources/admin">
    <meta property="og:type" content="website">

    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="admin_style.css">
</head>
<body>
    <div class="hero-bg"></div><div class="hero-grid"></div><div class="blob blob1"></div><div class="blob blob2"></div>
    <div id="loader" class="hidden"><div class="spinner"></div></div>
    <div id="toast-container"></div>
    <div id="confirm-overlay" class="hidden">
        <div class="confirm-box">
            <h3 id="confirm-title" style="margin-bottom: 10px; color:var(--text);">Confirm Action</h3>
            <p id="confirm-msg" style="font-size: .9rem; color: var(--text2);">Are you sure?</p>
            <div class="confirm-actions">
                <button class="btn btn-outline" onclick="closeConfirm()">Cancel</button>
                <button class="btn" id="confirm-yes-btn">Yes ✦</button>
            </div>
        </div>
    </div>
    
    <!-- Edit User Modal -->
    <div id="edit-user-modal" class="modal-overlay hidden">
        <div class="modal-box" style="text-align:left;">
            <h3 id="edit-user-title" style="margin-bottom: 20px;">Edit User Details</h3>
            <form id="editUserForm" onsubmit="event.preventDefault(); handleUserUpdate();">
                <input type="hidden" id="edit_user_id">
                <div class="form-group"><label>Full Name</label><input type="text" id="edit_user_name" required></div>
                <div class="form-group"><label>Mobile Number</label><input type="tel" id="edit_user_mobile" readonly style="background:var(--surface3); cursor:not-allowed;"></div>
                <div class="form-group"><label>New Password (Optional)</label><input type="text" id="edit_user_password" placeholder="Leave blank to keep unchanged"></div>
                <div class="modal-actions" style="margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeEditUserModal()">Cancel</button>
                    <button type="submit" class="btn">Update User</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Custom Change Password Modal -->
    <div id="change-password-modal" class="modal-overlay hidden">
        <div class="modal-box" style="text-align:left;">
            <h3 style="margin-bottom: 20px;">Change Admin Password</h3>
            <form id="changePasswordForm" onsubmit="event.preventDefault(); handleChangePassword();">
                <div class="form-group"><label>New Password</label><input type="password" id="new_admin_password" required minlength="6" placeholder="Enter new strong password"></div>
                <div class="modal-actions" style="margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeChangePasswordModal()">Cancel</button>
                    <button type="submit" class="btn">Update Password</button>
                </div>
            </form>
        </div>
    </div>


    <div id="login-view" class="hidden"> <!-- Kept hidden for script compatibility --> </div>
    <div id="app-view" class="hidden">
        <header>
            <div class="flex align-center" style="gap: 12px;">
                <i class="fas fa-users" style="color: var(--accent2); font-size: 1.2rem; text-shadow: 0 0 10px var(--glow);"></i>
                <h2>Manage Users</h2>
            </div>
            <div class="flex align-center" style="gap: 20px;">
                <i id="theme-toggle-icon" class="fas fa-moon" style="font-size: 1.2rem; color: var(--text2); cursor: pointer;" onclick="toggleTheme()" title="Switch Theme"></i>
                <i class="fas fa-user-circle" style="font-size: 1.3rem; color: var(--text2); cursor: pointer;" onclick="openProfileDrawer()" title="Profile"></i>
            </div>
        </header>

        <div id="drawer-overlay" class="drawer-overlay" onclick="closeProfileDrawer()"></div>
        <div id="profile-drawer" class="profile-drawer">
            <div class="drawer-header"><h3>Admin Profile</h3><i class="fas fa-times" onclick="closeProfileDrawer()"></i></div>
            <div class="drawer-body">
                <div class="drawer-avatar"><i class="fas fa-crown"></i></div>
                <div class="drawer-name">Admin</div>
                <div class="drawer-mobile">Main Administrator</div>
                <div class="drawer-menu"><button class="btn btn-outline" onclick="openChangePassword()"><i class="fas fa-key"></i> Change Password</button></div>
            </div>
            <div class="drawer-footer"><button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Log Out</button></div>
        </div>

        <main>
            <div class="flex justify-between align-center" style="margin-bottom: 24px;">
                <h3 style="font-size: 1.2rem;">All Users</h3>
                <button class="action-btn-sm" id="refresh-users-btn" onclick="forceFetchUsers()" title="Refresh Users"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div id="users-list"></div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="books.html" class="nav-item"><i class="fas fa-book"></i><span>Books</span></a>
            <a href="users.html" class="nav-item active"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="payments.html" class="nav-item"><i class="fas fa-wallet"></i><span>Payments</span></a>
            <a href="new-ebook.html" class="nav-item add-btn"><i class="fas fa-plus"></i><span>Add</span></a>
        </nav>
    </div>

    <script src="admin_script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (isAdminLoggedIn()) {
                renderUsersSkeletons();
                fetchUsers(false);
            }
        });

        function renderUsersSkeletons() {
            const container = document.getElementById("users-list");
            container.innerHTML = "";
            for (let i = 0; i < 5; i++) {
                container.innerHTML += `
                <div class="card skeleton">
                    <div class="ebook-thumb skeleton"></div>
                    <div class="card-details">
                        <div class="skeleton" style="height: 16px; width: 60%;"></div>
                        <div class="skeleton" style="height: 12px; width: 40%;"></div>
                        <div class="skeleton" style="height: 12px; width: 30%;"></div>
                    </div>
                    <div class="flex" style="flex-direction:column; justify-content:center;">
                        <div class="skeleton" style="width: 36px; height: 36px; border-radius: 10px;"></div>
                    </div>
                </div>`;
            }
        }

        function renderUsers(data) {
            const container = document.getElementById("users-list");
            
            if (data === null) {
                 container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Failed to load users.</div>`;
                 return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i>No users found.</div>`;
                return;
            }

            container.innerHTML = "";
            data.forEach(user => {
                container.innerHTML += `
                <div class="card">
                    <div class="ebook-thumb flex align-center justify-center" style="font-size:1.8rem; color:var(--accent2); background:var(--glow2);"><i class="fas fa-user"></i></div>
                    <div class="card-details">
                        <div class="card-title">${user.name}</div>
                        <div class="card-sub" style="font-family:'DM Mono', monospace;">${user.mobile}</div>
                        <div class="card-sub"><strong>ID:</strong> ${user.id}</div>
                    </div>
                    <div class="flex" style="flex-direction:column; justify-content:center;">
                        <button class="action-btn-sm" onclick="openEditUserModal('${user.id}')" title="Edit User"><i class="fas fa-edit"></i></button>
                    </div>
                </div>`;
            });
        }
        
        function openEditUserModal(id) {
            const user = window.usersData.find(u => String(u.id) === String(id));
            if (!user) return;
            document.getElementById('edit_user_id').value = user.id;
            document.getElementById('edit_user_name').value = user.name;
            document.getElementById('edit_user_mobile').value = user.mobile;
            document.getElementById('edit_user_password').value = '';
            document.getElementById('edit-user-modal').classList.remove('hidden');
        }

        function closeEditUserModal() {
            document.getElementById('edit-user-modal').classList.add('hidden');
        }

        function handleUserUpdate() {
     const payload = {
        id: document.getElementById('edit_user_id').value,
        name: document.getElementById('edit_user_name').value,
        password: document.getElementById('edit_user_password').value
     };
     closeEditUserModal();
     showToast("Updating user details...", "info");
     
     // API CALL KO UNCOMMENT KAR DEIN
     apiCall("updateUser", "POST", payload, true).then(res => {
        if (res && res.success) { 
            showToast("User updated!", "success"); 
            // Update successful hone ke baad users ki list ko refresh kar lein
            forceFetchUsers(); 
        } else { 
            showToast("Update failed on server.", "error"); 
        }
     });
}

    </script>
</body>
</html>
