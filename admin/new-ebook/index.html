    <style>
        .multi-select-container { position: relative; width: 100%; }
        .multi-select-header { background: var(--surface2); border: 1px solid var(--border2); padding: 12px 16px; border-radius: var(--r); display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--text3); font-size: .92rem; transition: var(--transition); }
        .multi-select-header:hover { border-color: var(--accent); }
        .multi-select-dropdown { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow2); z-index: 100; max-height: 220px; overflow-y: auto; display: none; flex-direction: column; }
        .multi-select-dropdown.active { display: flex; animation: slideUp 0.2s ease forwards; }
        .multi-select-option { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-size: .9rem; border-bottom: 1px solid var(--border2); transition: background var(--transition); }
        .multi-select-option:hover { background: var(--surface3); }
        .multi-select-option:last-child { border-bottom: none; }
        .multi-select-option input[type="checkbox"] { accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; }
        .modal-overlay { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 1; visibility: visible; }
        .modal-overlay.hidden { display: flex !important; opacity: 0; visibility: hidden; pointer-events: none; }
        /* 🔥 Dropdowns ke beech exact spacing ke liye 🔥 */
        .multi-select-container { 
    margin-top: 8px; 
    margin-bottom: 18px; 
    position: relative; 
    width: 100%; 
}

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            const ebookId = document.getElementById("ebook_id") ? document.getElementById("ebook_id").value : "";
            const cache = localStorage.getItem("admin_cache_ebooks");
            
            if (cache) {
                const books = JSON.parse(cache);
                
                if (ebookId) { 
                    // ✏️ EDIT MODE: Purani book ka asli number dhoondh kar fill karo
                    const currentBook = books.find(b => b.id === ebookId);
                    if (currentBook && currentBook.sort_order !== undefined) {
                        document.getElementById("eb_sort_order").value = currentBook.sort_order;
                    }
                } else {
                    // ➕ NEW EBOOK: Agla available number auto-fill karo
                    const maxOrder = books.reduce((max, b) => Math.max(max, (b.sort_order || 0)), 0);
                    document.getElementById("eb_sort_order").value = maxOrder + 1;
                }
            } else if (!ebookId) {
                document.getElementById("eb_sort_order").value = 1;
            }
        }, 1000); // Thoda delay taaki baaki fields pehle load ho jayein
    });
</script>

    <script>
        // ✅ Jhatka-Free Dropdown Toggle
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            const isClosing = dropdown.classList.contains('active');
            
            document.querySelectorAll('.multi-select-dropdown').forEach(d => d.classList.remove('active'));
            
            if (!isClosing) {
                dropdown.classList.add('active');
                const searchInput = dropdown.querySelector('input[type="text"]');
                if (searchInput) { 
                    searchInput.value = ''; 
                    filterOptions(searchInput, id.replace('dropdown', 'options')); 
                    // 🔥 focus() yahan se hata diya hai taaki page left me na bhage
                }
            }
        }
        // ✅ Firebase se Master Languages aur Categories load karne ka function
        async function loadMasterTags() {
            try {
                const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                const dbInstance = getFirestore();
                const docRef = doc(dbInstance, "settings", "app_data");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // 1. Languages load karo
                    if (data.languages) {
                        const langContainer = document.getElementById('lang-options');
                        data.languages.forEach(lang => {
                            // Check karo ki kahin ye pehle se HTML mein toh nahi hai?
                            if (!langContainer.querySelector(`input[value="${lang}"]`)) {
                                const html = `<label class="multi-select-option"><input type="checkbox" value="${lang}" onchange="updateSelected('lang')"> ${lang}</label>`;
                                langContainer.insertAdjacentHTML('beforeend', html);
                            }
                        });
                    }

                    // 2. Categories load karo
                    if (data.categories) {
                        const catContainer = document.getElementById('cat-options');
                        data.categories.forEach(cat => {
                            if (!catContainer.querySelector(`input[value="${cat}"]`)) {
                                const html = `<label class="multi-select-option"><input type="checkbox" value="${cat}" onchange="updateSelected('cat')"> ${cat}</label>`;
                                catContainer.insertAdjacentHTML('beforeend', html);
                            }
                        });
                    }
                }
            } catch (error) {
                console.error("Error loading master tags:", error);
            }
        }


let currentTagType = ''; 

window.addNewTag = function(type) {
    currentTagType = type;
    const label = type === 'language' ? 'Language' : 'Category';
    document.getElementById('add-tag-title').innerText = `Add New ${label}`;
    document.getElementById('new-tag-input').value = ''; 
    document.getElementById('add-tag-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('new-tag-input').focus(), 100); 
};

window.closeAddTagModal = function() {
    document.getElementById('add-tag-modal').classList.add('hidden');
};

        // ✅ Confirm & Add Tag (Instant UI + Permanent Firebase Save)
        window.confirmAddTag = async function() {
            const inputVal = document.getElementById('new-tag-input').value.trim();
            const label = currentTagType === 'language' ? 'Language' : 'Category';
            const valId = currentTagType === 'language' ? 'lang' : 'cat';
            const optionsContainer = document.getElementById(`${valId}-options`);
            
            if (inputVal !== '') {
                // STEP 1: UI mein turant add karo aur select karo (No waiting)
                const newOptionHTML = `<label class="multi-select-option"><input type="checkbox" value="${inputVal}" onchange="updateSelected('${valId}')" checked> ${inputVal}</label>`;
                optionsContainer.insertAdjacentHTML('beforeend', newOptionHTML);
                updateSelected(valId);
                window.closeAddTagModal();
                
                if (window.showToast) window.showToast(`Saving ${label} to database...`);

                // STEP 2: Firebase ki Master List mein hamesha ke liye save karo
                try {
                    // ReferenceError se bachne ke liye Firebase import
                    const { getFirestore, doc, setDoc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    const dbInstance = getFirestore();
                    
                    // Firebase mein 'settings' collection ke andar 'app_data' document banayenge
                    const docRef = doc(dbInstance, "settings", "app_data");
                    
                    // 'arrayUnion' ka fayda: Agar language pehle se hai toh dobara add nahi karega
                    const updateData = currentTagType === 'language' 
                        ? { languages: arrayUnion(inputVal) } 
                        : { categories: arrayUnion(inputVal) };
                    
                    // setDoc (merge: true) use kiya taaki pehli baar mein file automatic create ho jaye
                    await setDoc(docRef, updateData, { merge: true });
                    
                    if (window.showToast) window.showToast(`${label} saved permanently!`);
                } catch (error) {
                    console.error("Firebase save error:", error);
                    // Agar internet gaya toh bhi UI mein toh rahega hi
                    if (window.showToast) window.showToast(`Saved to dropdown, but Firebase failed.`, "error");
                }
            } else {
                if (window.showToast) window.showToast("Please enter a name first", "error");
            }
        };

        // ✅ 2. Live Search Filter Logic
        function filterOptions(inputElement, optionsContainerId) {
            const filter = inputElement.value.toLowerCase();
            const options = document.getElementById(optionsContainerId).getElementsByTagName('label');
            
            for (let i = 0; i < options.length; i++) {
                const text = options[i].textContent || options[i].innerText;
                if (text.toLowerCase().indexOf(filter) > -1) {
                    options[i].style.display = "";
                } else {
                    options[i].style.display = "none";
                }
            }
        }

        // ✅ 3. Universal Selection Updater (Dono ke liye kaam karega)
        function updateSelected(type) {
            let selected = [];
            document.querySelectorAll(`#${type}-options input:checked`).forEach(chk => {
                selected.push(chk.value);
            });
            
            const hiddenInput = type === 'lang' ? document.getElementById('eb_language') : document.getElementById('eb_category');
            const textDisplay = type === 'lang' ? document.getElementById('selected-langs-text') : document.getElementById('selected-cats-text');
            const defaultText = type === 'lang' ? 'Select Languages' : 'Select Categories';
            
            hiddenInput.value = selected.join(', ');
            
            if(selected.length > 0) {
                textDisplay.innerText = selected.join(', ');
                textDisplay.style.color = 'var(--text)';
            } else {
                textDisplay.innerText = defaultText;
                textDisplay.style.color = 'var(--text3)';
            }
        }

        // Dropdown ke bahar click karne par usko band karna
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.multi-select-container')) {
                document.querySelectorAll('.multi-select-dropdown').forEach(d => d.classList.remove('active'));
            }
        });

        function togglePriceFields() {
            const isFreeCheckbox = document.getElementById("eb_isfree");
            if (!isFreeCheckbox) return;
            const isFree = isFreeCheckbox.checked;
            const priceDiv = document.getElementById("price-fields");
            if(priceDiv) {
                priceDiv.style.display = isFree ? "none" : "block";
                document.getElementById("eb_price").required = !isFree;
            }
        }

        function cancelEdit() {
            sessionStorage.removeItem('edit_ebook_id');
            window.location.href = '/admin/books/';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.multi-select-container')) {
                const dropdown = document.getElementById('lang-dropdown');
                if(dropdown) dropdown.classList.remove('active');
            }
        });

        // ✅ FULLY OPTIMIZED SWR DOMContentLoaded WORKFLOW
        document.addEventListener("DOMContentLoaded", async () => {
            if (localStorage.getItem("islamic_admin_auth") === "true") {
                document.getElementById('app-view').classList.remove('hidden');
                
                const editId = sessionStorage.getItem('edit_ebook_id');
                const submitBtn = document.getElementById('submit-ebook-btn');
                let cachedBook = null;

                // ==========================================
                // 🟢 STEP 1: SABSE PEHLE CACHE LOAD (0 Delay)
                // ==========================================
                if (editId) {
                    document.getElementById('form-title').innerText = "Edit Ebook";
                    if(submitBtn) submitBtn.innerHTML = "Update Ebook &#10022;";
                    if(document.getElementById('cancel-edit-btn')) document.getElementById('cancel-edit-btn').classList.remove('hidden');

                    const cachedData = localStorage.getItem("admin_cache_ebooks");
                    if(cachedData) {
                        try {
                            const books = JSON.parse(cachedData);
                            cachedBook = books.find(e => String(e.id) === String(editId));

                            if(cachedBook) {
                                // Turant saari fields fill karo bina kisi wait ke
                                document.getElementById("ebook_id").value = cachedBook.id;
                                document.getElementById("eb_title").value = cachedBook.title || "";
                                document.getElementById("eb_desc").value = cachedBook.description || "";
                                document.getElementById("eb_pdf").value = cachedBook.pdf_link || "";
                                document.getElementById("eb_thumb").value = cachedBook.thumbnail || "";
                                document.getElementById("eb_isfree").checked = cachedBook.is_free === true || String(cachedBook.is_free).toLowerCase() === "true";
                                document.getElementById("eb_price").value = cachedBook.price || "";
                                document.getElementById("eb_discount").value = cachedBook.discount_price || "";
                                
                                if (cachedBook.language) {
                                    document.getElementById("eb_language").value = cachedBook.language;
                                    let langsArray = cachedBook.language.split(',').map(l => l.trim());
                                    document.querySelectorAll('#lang-options input').forEach(chk => { chk.checked = langsArray.includes(chk.value); });
                                    updateSelected('lang'); 
                                }

                                if (cachedBook.category) {
                                    document.getElementById("eb_category").value = cachedBook.category;
                                    let catsArray = cachedBook.category.split(',').map(l => l.trim());
                                    document.querySelectorAll('#cat-options input').forEach(chk => { chk.checked = catsArray.includes(chk.value); });
                                    updateSelected('cat'); 
                                }
                            }
                        } catch(e) { console.error("Cache read error:", e); }
                    }
                    togglePriceFields();
                } else {
                    // Naya Ebook add hone wala default UI setup
                    document.getElementById('form-title').innerText = "Add New Ebook";
                    togglePriceFields();
                }

                // ==========================================
                // 🔵 STEP 2: AB NETWORK SE MASTER TAGS LOAD KARO
                // ==========================================
                // Cache load hone ke baad ab ye dropdown ke naye options layega
                await loadMasterTags(); 

                // Master tags load hone par agar koi naya checkbox bana hai, toh use dobara tick mark kar do
                if (editId && cachedBook) {
                    if (cachedBook.language) {
                        let langsArray = cachedBook.language.split(',').map(l => l.trim());
                        document.querySelectorAll('#lang-options input').forEach(chk => { chk.checked = langsArray.includes(chk.value); });
                        updateSelected('lang');
                    }
                    if (cachedBook.category) {
                        let catsArray = cachedBook.category.split(',').map(l => l.trim());
                        document.querySelectorAll('#cat-options input').forEach(chk => { chk.checked = catsArray.includes(chk.value); });
                        updateSelected('cat');
                    }
                }

                // ==========================================
                // 🟠 STEP 3: SILENT BACKGROUND FIREBASE CHECK
                // ==========================================
                if (editId) {
                    (async () => {
                        try {
                            const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                            const dbInstance = getFirestore();
                            
                            // 1. Pehle Public Data Fetch Karo
                            const docSnap = await getDoc(doc(dbInstance, "ebooks", editId));
                            
                            if (docSnap.exists()) {
                                const freshBook = docSnap.data();
                                
                                if (document.getElementById("eb_title").value !== freshBook.title) document.getElementById("eb_title").value = freshBook.title || "";
                                if (document.getElementById("eb_desc").value !== freshBook.description) document.getElementById("eb_desc").value = freshBook.description || "";
                                if (document.getElementById("eb_thumb").value !== freshBook.thumbnail) document.getElementById("eb_thumb").value = freshBook.thumbnail || "";
                                
                                const freshIsFree = freshBook.is_free === true || String(freshBook.is_free).toLowerCase() === "true";
                                if (document.getElementById("eb_isfree").checked !== freshIsFree) {
                                    document.getElementById("eb_isfree").checked = freshIsFree;
                                    togglePriceFields();
                                }
                                if (document.getElementById("eb_price").value != (freshBook.price || "")) document.getElementById("eb_price").value = freshBook.price || "";
                                if (document.getElementById("eb_discount").value != (freshBook.discount_price || "")) document.getElementById("eb_discount").value = freshBook.discount_price || "";
                                
                                if (document.getElementById("eb_language").value !== freshBook.language) {
                                    document.getElementById("eb_language").value = freshBook.language || "";
                                    let langsArray = (freshBook.language || "").split(',').map(l => l.trim());
                                    document.querySelectorAll('#lang-options input').forEach(chk => { chk.checked = langsArray.includes(chk.value); });
                                    updateSelected('lang');
                                }
                                if (document.getElementById("eb_category").value !== freshBook.category) {
                                    document.getElementById("eb_category").value = freshBook.category || "";
                                    let catsArray = (freshBook.category || "").split(',').map(l => l.trim());
                                    document.querySelectorAll('#cat-options input').forEach(chk => { chk.checked = catsArray.includes(chk.value); });
                                    updateSelected('cat');
                                }

                                // 🔥 THE FIX: Vault Check for Paid Books (Yahan Magic Hoga)
                                let finalPdfLink = freshBook.pdf_link || ""; 
                                
                                // Agar link khali hai aur book Free nahi hai, toh tijori mein dhoondho!
                                if (finalPdfLink === "" && !freshIsFree) {
                                    try {
                                        const secureSnap = await getDoc(doc(dbInstance, "secure_links", editId));
                                        if (secureSnap.exists() && secureSnap.data().pdf_link) {
                                            finalPdfLink = secureSnap.data().pdf_link;
                                        }
                                    } catch(err) { console.log("Secure Vault Check Error:", err); }
                                }

                                // Finally, PDF Box update karo
                                if (document.getElementById("eb_pdf").value !== finalPdfLink) {
                                    document.getElementById("eb_pdf").value = finalPdfLink;
                                }
                            }
                        } catch (err) { console.log("Background Edit SWR Error:", err); }
                    })();
                } else {

                    // Nayi Book ke liye Auto-Position system (Instant Cache + Background Firebase)
                    const orderInput = document.getElementById("eb_sort_order");
                    let nextNumber = 1;

                    const cachedData = localStorage.getItem("admin_cache_ebooks");
                    if (cachedData) {
                        try {
                            const books = JSON.parse(cachedData);
                            if (books && books.length > 0) {
                                const maxOrder = books.reduce((max, b) => Math.max(max, (Number(b.sort_order) || 0)), 0);
                                nextNumber = maxOrder + 1;
                            }
                        } catch(e) { console.error("Cache read error:", e); }
                    }
                    if(orderInput) orderInput.value = nextNumber;

                    (async () => {
                        try {
                            const { getFirestore, collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                            const dbInstance = getFirestore();
                            const snapshot = await getDocs(collection(dbInstance, "ebooks"));
                            const allBooks = snapshot.docs.map(doc => doc.data());
                            
                            if (allBooks.length > 0) {
                                const realMaxOrder = allBooks.reduce((max, b) => Math.max(max, (Number(b.sort_order) || 0)), 0);
                                const realNextNumber = realMaxOrder + 1;
                                if (realNextNumber !== nextNumber && orderInput) {
                                    orderInput.value = realNextNumber;
                                }
                            }
                        } catch (error) { console.log("Position check error:", error); }
                    })();
                }

            } else {
                window.location.replace('/admin/new-ebook/');
            }
        });

    </script>
</body>
</html>
