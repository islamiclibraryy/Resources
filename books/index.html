window.executeChangePassword = async function() {
    const newPass = document.getElementById("user_new_password").value.trim();
    const btn = document.getElementById("update-pass-btn");

    if (newPass.length < 6) {
        window.showToast("Password must be at least 6 characters!", "error");
        return;
    }

    // Firebase Auth se current user nikalo
    const { getAuth, updatePassword } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js");
    const auth = getAuth();
    const user = auth.currentUser;

    if (!user) {
        window.showToast("Session expired. Please login again.", "error");
        return;
    }

    try {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;

        // Password update command
        await updatePassword(user, newPass);
        
        window.showToast("Password updated successfully!", "success");
        window.closeChangePasswordModal();

    } catch (error) {
        console.error("Password Update Error:", error);
        
        // Agar user ne bohot time se login kiya hua hai toh ye error aayega
        if (error.code === 'auth/requires-recent-login') {
            window.showToast("Security alert: Please logout and login again to change your password.", "error");
        } else {
            window.showToast("Error: " + error.message, "error");
        }
    } finally {
        btn.innerHTML = 'Update Password';
        btn.disabled = false;
    }
}

        async function fetchPaymentsFirebase(uid, cacheKey, onDataChange) {

            window.apiLocks[cacheKey] = true;

            try {
                const { getFirestore, collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                const dbInstance = getFirestore();
                
                // 🔥 Saari payments ek hi baar mein fetch kar raha hai
                const q = query(collection(dbInstance, "payments"), where("user_id", "==", uid));
                const snapshot = await getDocs(q);
                const freshData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const freshDataStr = JSON.stringify(freshData);
                
                // Agar server par data badla hai tabhi cache update hoga
                if (cachedDataStr !== freshDataStr) {
                    localStorage.setItem(cacheKey + "_data", freshDataStr); 
                    localStorage.setItem(cacheKey + "_time", now.toString());
                    onDataChange(freshData); // Call the callback to update UI
                } else { 
                    // Data same hai, bas lock ka time naya kar do
                    localStorage.setItem(cacheKey + "_time", now.toString()); 
                }
            } catch (error) {
                console.error("Firebase fetch error:", error);
            } finally {
                delete window.apiLocks[cacheKey]; // API lock khol do
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            window.initTheme();
            initBook();
        });

        // 🔥 THE MAGIC FIX: BROWSER BACK BUTTON BFCache Reset 🔥
        // Jab user mobile ka Back button dabakar wapas aayega, toh ye event trigger hoga
        window.addEventListener("pageshow", (event) => {
            // Check karta hai ki kya page history/cache se wapas restore hua hai
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                // Instantly data wapas read karke button ko update kar dega
                initBook();
            }
        });


        // ✅ BACKGROUND FIREBASE SECURITY CHECK (Freemium Update)
onAuthStateChanged(auth, (user) => {
    if (!user) { 
        // Ab hum usko bahar nahi fekenge, Guest mode active rahega
        localStorage.removeItem("islamic_user_id");
        localStorage.removeItem("islamic_user_name");
        localStorage.removeItem("islamic_user_mobile");
    }
});

        // ⚡ THE INSTANT RENDER ENGINE
        function initBook() {
            const bookDataStr = sessionStorage.getItem("selected_book_data");
            const userId = localStorage.getItem("islamic_user_id");

            if(bookDataStr) {
                window.currentEbook = JSON.parse(bookDataStr);
                
                // Guest User: Payment fetch mat karo
                if (!userId) {
                    window.userPayments = [];
                    renderDetail();
                    return; 
                }

                // Pehle instant render purane cache se (agar hai)
                const cacheKey = `cache_payments_${userId}`;
                const cachedPaymentsStr = localStorage.getItem(cacheKey + "_data");
                if(cachedPaymentsStr) { 
                    try { window.userPayments = JSON.parse(cachedPaymentsStr); } catch(e) { window.userPayments = []; } 
                } else {
                    window.userPayments = [];
                }
                
                renderDetail(); // ⚡ Instant Show
                
                // 🕵️ Background Sync chalao jo 5 min wala logic check karega
                fetchPaymentsFirebase(userId, cacheKey, (data) => {
                    if (Array.isArray(data)) { 
                        window.userPayments = data; 
                        renderDetail(); // Agar naya data aaya, toh button hand-to-hand update hoga
                    }
                });

            } else {
                window.location.replace("/");
            }
        }

// =========================================================================
// 🔒 SECURE RENDER DETAIL FUNCTION (With 1-Second Delay & Smart Toasts)
// =========================================================================
function renderDetail() {
    document.getElementById("action-footer").classList.remove("hidden");
    document.getElementById("det-thumb").src = window.currentEbook.thumbnail;
    document.getElementById("det-title").innerText = window.currentEbook.title;
    document.getElementById("det-desc").innerText = window.currentEbook.description;

    if(!document.getElementById("det-arabic-phrase").innerText) {
        if (typeof ARABIC_PHRASES !== 'undefined' && ARABIC_PHRASES.length > 0) {
            document.getElementById("det-arabic-phrase").innerText = ARABIC_PHRASES[Math.floor(Math.random() * ARABIC_PHRASES.length)];
        }
    }

    const isFree = String(window.currentEbook.is_free) === "true";
    const priceBox = document.getElementById("det-price-box");
    const footerPrice = document.getElementById("det-footer-price");
    const actionBtn = document.getElementById("det-action-btn");
    
    const ownedBook = (window.userPayments || []).find(p => String(p.ebook_id) === String(window.currentEbook.id) && p.status.toLowerCase() !== "rejected");

    // 🔥 UPDATED: Top Price Box (Pill Shape Badges) 🔥
    if (isFree) {
        priceBox.innerHTML = `<div class="price-wrapper"><span class="badge-free">✦ 100% FREE</span></div>`;
    } else {
        let priceNum = window.currentEbook.discount_price || window.currentEbook.price;
        let pHTML = `₹${priceNum}`;
        if (window.currentEbook.discount_price && window.currentEbook.price > window.currentEbook.discount_price) {
            pHTML += ` <span class="strike-price">₹${window.currentEbook.price}</span>`;
        }
        priceBox.innerHTML = `<div class="price-wrapper"><span class="badge-premium">${pHTML}</span></div>`;
    }

    actionBtn.className = "btn"; actionBtn.disabled = false; actionBtn.style.background = ""; actionBtn.style.color = ""; actionBtn.style.boxShadow = "";

    // 🛡️ SCENARIO 1: PAID BOOK (Local Cache says 'Approved')
    if (ownedBook) {
        if (ownedBook.status.toLowerCase() === "approved") {
            // 🔥 NAYA OWNED BADGE
            footerPrice.innerHTML = `<span class="badge-premium" style="background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: var(--success);">Owned ✓</span>`;
            actionBtn.innerHTML = `<i class="fas fa-download"></i> Download`;
            actionBtn.style.background = "var(--success)"; actionBtn.style.boxShadow = "0 4px 20px rgba(16,185,129,0.3)"; actionBtn.style.color = "#fff";
            
            // 🔥 THE MAGIC: REAL-TIME VERIFICATION + LINK FETCH 🔥
            actionBtn.onclick = async () => {
                const currentUserId = localStorage.getItem("islamic_user_id");
                const originalHTML = actionBtn.innerHTML;
                
                window.showToast("Verifying your access... Please wait", "info");
                actionBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Verifying...`;
                actionBtn.disabled = true;

                try {
                    const { getFirestore, doc, getDoc, collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    const dbInstance = getFirestore();
                    
                    const qPay = query(collection(dbInstance, "payments"), 
                        where("user_id", "==", currentUserId), 
                        where("ebook_id", "==", String(window.currentEbook.id))
                    );
                    const paySnap = await getDocs(qPay);
                    
                    let liveStatus = "pending";
                    if (!paySnap.empty) liveStatus = paySnap.docs[0].data().status.toLowerCase();

                    // Agar Live status Approved nahi hai (yani reject/pending ho gaya)
                    if (liveStatus !== "approved") {
                        let errorMsg = liveStatus === "rejected" 
                            ? "Access Denied! Your payment was rejected. Please contact support." 
                            : `Access Denied! Your payment is currently ${liveStatus}.`;
                        
                        window.showToast(errorMsg, "error");
                        
                        const cacheKey = `cache_payments_${currentUserId}_data`;
                        let cachedPayments = JSON.parse(localStorage.getItem(cacheKey)) || [];
                        const pIndex = cachedPayments.findIndex(p => String(p.ebook_id) === String(window.currentEbook.id));
                        if(pIndex > -1) {
                            cachedPayments[pIndex].status = liveStatus;
                        } else if (!paySnap.empty) {
                            cachedPayments.push({id: paySnap.docs[0].id, ...paySnap.docs[0].data()});
                        }
                        localStorage.setItem(cacheKey, JSON.stringify(cachedPayments));
                        window.userPayments = cachedPayments; 
                        
                        renderDetail(); // 🛑 Auto-refresh hata diya, button turant badal jayega
                        return; 
                    }

                    // 🚨 STEP 2: Access Verified! Ab Tijori se link lao
                    const secureDocRef = doc(dbInstance, "secure_links", String(window.currentEbook.id));
                    const secureDocSnap = await getDoc(secureDocRef);

                    if (secureDocSnap.exists() && secureDocSnap.data().pdf_link) {
                        window.showToast("Access Verified! Preparing file download...", "success");
                        
                        // 🔥 1-SECOND DELAY 🔥
                        setTimeout(() => {
                            window.open(secureDocSnap.data().pdf_link, "_blank");
                            if (actionBtn.innerHTML.includes("Verifying")) {
                                actionBtn.innerHTML = originalHTML;
                                actionBtn.disabled = false;
                            }
                        }, 1000);
                    } else {
                        window.showToast("Secure file not found. Please contact admin.", "error");
                        if (actionBtn.innerHTML.includes("Verifying")) {
                            actionBtn.innerHTML = originalHTML;
                            actionBtn.disabled = false;
                        }
                    }
                } catch (err) {
                    console.error("Verification Error:", err);
                    window.showToast("Network error during verification.", "error");
                    if (actionBtn.innerHTML.includes("Verifying")) {
                        actionBtn.innerHTML = originalHTML;
                        actionBtn.disabled = false;
                    }
                }
            };
            
        } else {
            // Pending in Verification
       
            // 🔥 NAYA PENDING BADGE
            footerPrice.innerHTML = `<span class="badge-premium" style="background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); color: var(--amber);">In Verification</span>`;
            actionBtn.innerHTML = `<i class="fas fa-hourglass-half spin"></i> Verifying...`;
            actionBtn.disabled = true; actionBtn.onclick = null;
        }
    } 
    // 🛡️ SCENARIO 2: FREE BOOK HAI (Direct Public Link)
    else if (isFree) {
        footerPrice.innerHTML = `<span class="badge-free">Free</span>`;

        actionBtn.innerHTML = `<i class="fas fa-download"></i> Download`;
        actionBtn.onclick = () => {
            if (window.currentEbook.pdf_link) {
                window.open(window.currentEbook.pdf_link, "_blank");
            } else {
                window.showToast("File link is currently unavailable.", "error");
            }
        };
    } 
    // 🛡️ SCENARIO 3: KHARIDNI PADEGI (Buy Now)
    // 🛡️ SCENARIO 3: KHARIDNI PADEGI (Buy Now)
    else {
        let priceNum = window.currentEbook.discount_price || window.currentEbook.price;
        let pHTML = `₹${priceNum}`;
        if (window.currentEbook.discount_price && window.currentEbook.price > window.currentEbook.discount_price) {
            pHTML += `<span class="strike-price">₹${window.currentEbook.price}</span>`;
        }
        // 🔥 NAYA FOOTER PRICE BADGE
        footerPrice.innerHTML = `<span class="badge-premium">${pHTML}</span>`;
        actionBtn.innerHTML = `Buy Now <i class="fas fa-arrow-right" style="margin-left:6px;"></i>`;
        actionBtn.style.background = "linear-gradient(135deg, #7c6af7, #9f3fbf)"; actionBtn.style.color = "#fff";
        
        actionBtn.onclick = () => {
            const currentUserId = localStorage.getItem("islamic_user_id");
            if (currentUserId) {
                window.location.href = '/payments/';
            } else {
                window.showToast("Please login to purchase premium books", "info");
                const originalHTML = actionBtn.innerHTML;
                actionBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Redirecting...`;
                actionBtn.disabled = true;
                localStorage.setItem('islamic_redirect_after_login', window.location.href);
                
                setTimeout(() => {
    // 🔥 1. Toast clear karne wali line (Jo humne add ki)
    const tContainer = document.getElementById("toast-container");
    if(tContainer) tContainer.innerHTML = ""; 

    // 2. Tera purana redirect logic
    window.location.href = '/login/';
    
    // 3. Tera purana button reset logic (Ise bilkul mat hatana)
    setTimeout(() => {
        actionBtn.innerHTML = originalHTML;
        actionBtn.disabled = false;
    }, 500);
}, 1500);

            }
        };
    }
}
