<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Manage Books - Islamic Library by Shekh</title>

    <link rel="icon" href="../hikmahadminlogonew.png">

    <meta property="og:title" content="Admin Dashboard - Islamic Library by Shekh">
    <meta property="og:description" content="Admin Dashboard for managing Islamic Library by Shekh">
    <meta property="og:image" content="https://islamiclibraryy.github.io/Resources/admin/hikmahadminlogonew.png">
    <meta property="og:url" content="https://islamiclibraryy.github.io/Resources/admin/">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../admin_style.css">

    <style>
        .modal-overlay { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 1; visibility: visible; }
        .modal-overlay.hidden { display: flex !important; opacity: 0; visibility: hidden; pointer-events: none; }
        
        /* 🔥 Nayi CSS Search aur Filter ke liye 🔥 */
        .filter-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-wrapper { position: relative; flex: 1; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text2); }
        .search-input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; }
        .filter-select { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="hero-bg"></div><div class="hero-grid"></div><div class="blob blob1"></div><div class="blob blob2"></div>
    
    <div id="toast-container"></div>
    
    <div id="confirm-overlay" class="modal-overlay hidden">
        <div class="confirm-box">
            <h3 id="confirm-title" style="margin-bottom: 10px; color:var(--text);">Confirm Action</h3>
            <p id="confirm-msg" style="font-size: .9rem; color: var(--text2);">Are you sure?</p>
            <div class="confirm-actions">
                <button class="btn btn-outline" onclick="window.closeConfirm()">Cancel</button>
                <button class="btn" id="confirm-yes-btn">Yes &#10022;</button>
            </div>
        </div>
    </div>
    
    <div id="change-password-modal" class="modal-overlay hidden">
        <div class="modal-box" style="text-align:left;">
            <h3 style="margin-bottom: 20px;">Change Admin Password</h3>
            <form id="changePasswordForm" onsubmit="event.preventDefault(); window.handleChangePassword();">
                <div class="form-group"><label>New Password</label><input type="password" id="new_admin_password" required minlength="6" placeholder="Enter new strong password"></div>
                <div class="modal-actions" style="margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="window.closeChangePasswordModal()">Cancel</button>
                    <button type="submit" class="btn">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-view">
        <header>
            <div class="flex align-center" style="gap: 12px;">
                <i class="fas fa-book" style="color: var(--accent2); font-size: 1.2rem; text-shadow: 0 0 10px var(--glow);"></i>
                <h2>Manage Books</h2>
            </div>
            <div class="flex align-center" style="gap: 20px;">
                <i id="theme-toggle-icon" class="fas fa-moon" style="font-size: 1.2rem; color: var(--text2); cursor: pointer;" onclick="window.toggleTheme()" title="Switch Theme"></i>
                <i class="fas fa-user-circle" style="font-size: 1.3rem; color: var(--text2); cursor: pointer;" onclick="window.openProfileDrawer()" title="Profile"></i>
            </div>
        </header>

        <div id="drawer-overlay" class="drawer-overlay" onclick="window.closeProfileDrawer()"></div>
        <div id="profile-drawer" class="profile-drawer">
            <div class="drawer-header"><h3>Admin Profile</h3><i class="fas fa-times" onclick="window.closeProfileDrawer()"></i></div>
            <div class="drawer-body">
                <div class="drawer-avatar"><i class="fas fa-crown"></i></div>
                <div class="drawer-name" id="profile-name">Admin</div>
                <div class="drawer-mobile" id="profile-email">Administration</div>
                <div class="drawer-menu"><button class="btn btn-outline" onclick="window.openChangePassword()"><i class="fas fa-key"></i> Change Password</button></div>
            </div>
            <div class="drawer-footer"><button class="btn btn-danger" onclick="window.logout()"><i class="fas fa-sign-out-alt"></i> Log Out</button></div>
        </div>

        <main>
            <div class="flex justify-between align-center" style="margin-bottom: 15px;">
                <h3 style="font-size: 1.2rem;">All Ebooks</h3>
                <button class="action-btn-sm" id="refresh-ebooks-btn" onclick="window.forceFetchEbooks()" title="Refresh Ebooks"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="filter-container">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="book-search-input" class="search-input" placeholder="Search title or description..." onkeyup="window.filterBooks()">
                </div>
                <select id="book-type-filter" class="filter-select" onchange="window.filterBooks()">
                    <option value="all">All Books</option>
                    <option value="free">Free</option>
                    <option value="premium">Premium</option>
                </select>
            </div>

            <div id="ebooks-list"></div>
        </main>

        <nav class="bottom-nav">
            <a href="../" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="./" class="nav-item active"><i class="fas fa-book"></i><span>Books</span></a>
            <a href="../users/" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="../payments/" class="nav-item"><i class="fas fa-wallet"></i><span>Payments</span></a>
            <a href="../new-ebook/" class="nav-item add-btn"><i class="fas fa-plus"></i><span>Add</span></a>
        </nav>
    </div>

    <script type="module" src="../admin_script.js"></script>

    <script>
        // SKELETON UI RENDERER
        window.renderEbooksSkeletons = function() {
            const container = document.getElementById("ebooks-list");
            container.innerHTML = ""; 
            for (let i = 0; i < 5; i++) {
                container.innerHTML += `
                <div class="card skeleton">
                    <div class="ebook-thumb skeleton"></div>
                    <div class="card-details">
                        <div class="skeleton" style="height: 16px; width: 80%;"></div>
                        <div class="skeleton" style="height: 12px; width: 50%;"></div>
                        <div class="skeleton" style="height: 24px; width: 60px; border-radius: 99px;"></div>
                    </div>
                    <div class="flex" style="flex-direction:column; justify-content:center; gap: 8px;">
                        <div class="skeleton" style="width: 36px; height: 36px; border-radius: 10px;"></div>
                        <div class="skeleton" style="width: 36px; height: 36px; border-radius: 10px;"></div>
                    </div>
                </div>`;
            }
        }

        // REAL DATA UI RENDERER
        window.renderEbooks = function(data) {
            const container = document.getElementById("ebooks-list");
            
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-book-open"></i>No ebooks found. Add one!</div>`;
                return;
            }

            container.innerHTML = ""; // Clear skeletons
            data.forEach(eb => {
                const isFree = String(eb.is_free).toLowerCase() === "true";
                // Data-type attribute add kiya gaya hai filtering ke liye
                const bookType = isFree ? "free" : "premium";
                
                const badge = isFree 
                    ? `<span class="badge badge-free">✦ FREE</span>` 
                    : `<span class="badge badge-price">₹${eb.discount_price || eb.price}</span>`;
                
                // 🔥 FIX: Classes added for filtering logic
                container.innerHTML += `
                <div class="card book-card-item" data-type="${bookType}">
                    <img src="${eb.thumbnail || ''}" class="ebook-thumb">
                    <div class="card-details">
                        <div class="card-title book-title-field">${eb.title || 'Untitled'}</div>
                        <div class="card-sub book-desc-field">${(eb.description || '').substring(0, 40)}...</div>
                        <div>${badge}</div>
                    </div>
                    <div class="flex" style="flex-direction:column; justify-content:center; gap: 8px;">
                        <button class="action-btn-sm" onclick="window.editEbook('${eb.id}')" title="Edit Ebook"><i class="fas fa-edit"></i></button>
                        <button class="action-btn-sm btn-danger" onclick="window.deleteEbook('${eb.id}')" title="Delete Ebook"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }

        // 🔥 NAYA FILTER & SEARCH LOGIC 🔥
        window.filterBooks = function() {
            const query = document.getElementById('book-search-input').value.toLowerCase();
            const filterType = document.getElementById('book-type-filter').value;
            const cards = document.querySelectorAll('.book-card-item');
            
            cards.forEach(card => {
                const title = card.querySelector('.book-title-field').innerText.toLowerCase();
                const desc = card.querySelector('.book-desc-field').innerText.toLowerCase();
                const type = card.getAttribute('data-type');
                
                // 1. Check Search Match
                const matchesSearch = title.includes(query) || desc.includes(query);
                
                // 2. Check Dropdown Match
                const matchesFilter = filterType === 'all' || type === filterType;
                
                // 3. Show only if BOTH conditions are met
                if(matchesSearch && matchesFilter) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // EDIT REDIRECT
        window.editEbook = function(id) {
            sessionStorage.setItem('edit_ebook_id', id);
            window.location.href = '../new-ebook/';
        }
    </script>
</body>
</html>
