<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Manage Ebook - Islamic Library by Shekh</title>

    <link rel="icon" href="../hikmahadminlogonew.png">

    <meta property="og:title" content="Admin Dashboard - Islamic Library by Shekh">
    <meta property="og:description" content="Admin Dashboard for managing Islamic Library by Shekh">
    <meta property="og:image" content="https://mysite.github.io/Resources/admin/hikmahadminlogonew.png">
    <meta property="og:url" content="https://mysite.github.io/Resources/admin/">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../admin_style.css">

    <style>
        .multi-select-container { position: relative; width: 100%; }
        .multi-select-header { background: var(--surface2); border: 1px solid var(--border2); padding: 12px 16px; border-radius: var(--r); display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: var(--text3); font-size: .92rem; transition: var(--transition); }
        .multi-select-header:hover { border-color: var(--accent); }
        .multi-select-dropdown { position: absolute; top: calc(100% + 5px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow2); z-index: 100; max-height: 220px; overflow-y: auto; display: none; flex-direction: column; }
        .multi-select-dropdown.active { display: flex; animation: slideUp 0.2s ease forwards; }
        .multi-select-option { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-size: .9rem; border-bottom: 1px solid var(--border2); transition: background var(--transition); }
        .multi-select-option:hover { background: var(--surface3); }
        .multi-select-option:last-child { border-bottom: none; }
        .multi-select-option input[type="checkbox"] { accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; }
        .modal-overlay { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 1; visibility: visible; }
        .modal-overlay.hidden { display: flex !important; opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hero-bg"></div><div class="hero-grid"></div><div class="blob blob1"></div><div class="blob blob2"></div>
    <div id="loader" class="hidden"><div class="spinner"></div></div>
    <div id="toast-container"></div>
    
    <div id="confirm-overlay" class="modal-overlay hidden">
        <div class="confirm-box">
            <h3 id="confirm-title" style="margin-bottom: 10px; color:var(--text);">Confirm Action</h3>
            <p id="confirm-msg" style="font-size: .9rem; color: var(--text2);">Are you sure?</p>
            <div class="confirm-actions">
                <button class="btn btn-outline" onclick="window.closeConfirm()">Cancel</button>
                <button class="btn" id="confirm-yes-btn">Yes &#10022;</button>
            </div>
        </div>
    </div>

    <div id="change-password-modal" class="modal-overlay hidden">
        <div class="modal-box" style="text-align:left;">
            <h3 style="margin-bottom: 20px;">Change Admin Password</h3>
            <form id="changePasswordForm" onsubmit="event.preventDefault(); window.handleChangePassword();">
                <div class="form-group"><label>New Password</label><input type="password" id="new_admin_password" required minlength="6" placeholder="Enter new strong password"></div>
                <div class="modal-actions" style="margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="window.closeChangePasswordModal()">Cancel</button>
                    <button type="submit" class="btn">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <header>
            <div class="flex align-center" style="gap: 12px;">
                <i class="fas fa-plus-circle" style="color: var(--accent2); font-size: 1.2rem; text-shadow: 0 0 10px var(--glow);"></i>
                <h2 id="form-title">Add New Ebook</h2>
            </div>
            <div class="flex align-center" style="gap: 20px;">
                <i id="theme-toggle-icon" class="fas fa-moon" style="font-size: 1.2rem; color: var(--text2); cursor: pointer;" onclick="window.toggleTheme()" title="Switch Theme"></i>
                <i class="fas fa-user-circle" style="font-size: 1.3rem; color: var(--text2); cursor: pointer;" onclick="window.openProfileDrawer()" title="Profile"></i>
            </div>
        </header>

        <div id="drawer-overlay" class="drawer-overlay" onclick="window.closeProfileDrawer()"></div>
        <div id="profile-drawer" class="profile-drawer">
            <div class="drawer-header"><h3>Admin Profile</h3><i class="fas fa-times" onclick="window.closeProfileDrawer()"></i></div>
            <div class="drawer-body">
                <div class="drawer-avatar"><i class="fas fa-crown"></i></div>
                <div class="drawer-name" id="profile-name">Admin</div>
                <div class="drawer-mobile" id="profile-email">Administration</div>
                <div class="drawer-menu"><button class="btn btn-outline" onclick="window.openChangePassword()"><i class="fas fa-key"></i> Change Password</button></div>
            </div>
            <div class="drawer-footer"><button class="btn btn-danger" onclick="window.logout()"><i class="fas fa-sign-out-alt"></i> Log Out</button></div>
        </div>

        <main>
            <div id="phrase-ebook" class="bismillah arabic-text text-center" style="margin-bottom: 24px;"></div>
            
            <form id="ebookForm" onsubmit="event.preventDefault(); window.handleEbookSubmit();">
                <input type="hidden" id="ebook_id">
                <div class="form-group"><label>Ebook Title</label><input type="text" id="eb_title" required placeholder="e.g., The Sealed Nectar"></div>
                <div class="form-group"><label>Description</label><textarea id="eb_desc" rows="3" required placeholder="Short description..."></textarea></div>
                <div class="form-group"><label>PDF Link (External URL)</label><input type="url" id="eb_pdf" required placeholder="https://drive.google.com/..."></div>
                <div class="form-group"><label>Thumbnail Image URL (1:1 Ratio)</label><input type="url" id="eb_thumb" required placeholder="https://imgur.com/...png"></div>
                
                <div class="form-group">
                    <label>Languages (Select Multiple)</label>
                    <div class="multi-select-container">
                        <div class="multi-select-header" onclick="toggleMultiSelect()">
                            <span id="selected-langs-text">Select Languages</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="multi-select-dropdown" id="lang-dropdown">
                            <label class="multi-select-option"><input type="checkbox" value="English" onchange="updateSelectedLangs()"> English</label>
                            <label class="multi-select-option"><input type="checkbox" value="Urdu" onchange="updateSelectedLangs()"> Urdu</label>
                            <label class="multi-select-option"><input type="checkbox" value="Hindi" onchange="updateSelectedLangs()"> Hindi</label>
                            <label class="multi-select-option"><input type="checkbox" value="Arabic" onchange="updateSelectedLangs()"> Arabic</label>
                            <label class="multi-select-option"><input type="checkbox" value="Roman Urdu / Hindi" onchange="updateSelectedLangs()"> Roman Urdu / Hindi</label>
                        </div>
                    </div>
                    <input type="hidden" id="eb_language" required>
                </div>
   
                        <div class="form-group" style="margin-top: 16px; margin-bottom: 16px;">
    <label>Book Position (Number)</label>
    <input type="number" id="eb_sort_order" placeholder="E.g. 1, 2, 3..." required>
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            const ebookId = document.getElementById("ebook_id") ? document.getElementById("ebook_id").value : "";
            const cache = localStorage.getItem("admin_cache_ebooks");
            
            if (cache) {
                const books = JSON.parse(cache);
                
                if (ebookId) { 
                    // ✏️ EDIT MODE: Purani book ka asli number dhoondh kar fill karo
                    const currentBook = books.find(b => b.id === ebookId);
                    if (currentBook && currentBook.sort_order !== undefined) {
                        document.getElementById("eb_sort_order").value = currentBook.sort_order;
                    }
                } else {
                    // ➕ NEW EBOOK: Agla available number auto-fill karo
                    const maxOrder = books.reduce((max, b) => Math.max(max, (b.sort_order || 0)), 0);
                    document.getElementById("eb_sort_order").value = maxOrder + 1;
                }
            } else if (!ebookId) {
                document.getElementById("eb_sort_order").value = 1;
            }
        }, 1000); // Thoda delay taaki baaki fields pehle load ho jayein
    });
</script>





                <div class="flex align-center justify-between mt-1" style="margin-bottom: 16px; padding: 12px; background: var(--surface3); border-radius: var(--r); border: 1px solid var(--border2);">
                    <label style="margin:0; font-size:.9rem; color:var(--text); text-transform:none; font-weight:600;">Is this Ebook FREE?</label>
                    <label class="switch"><input type="checkbox" id="eb_isfree" onchange="togglePriceFields()"><span class="slider"></span></label>
                </div>

                <div id="price-fields">
                    <div class="flex" style="gap: 16px;">
                        <div class="form-group" style="flex: 1;"><label>Regular Price (₹)</label><input type="number" step="0.01" id="eb_price" placeholder="0.00"></div>
                        <div class="form-group" style="flex: 1;"><label>Discount Price (₹)</label><input type="number" step="0.01" id="eb_discount" placeholder="0.00"></div>
                    </div>
                </div>

                <button type="submit" class="btn mt-2" id="submit-ebook-btn">Save Ebook &#10022;</button>
                <button type="button" class="btn btn-outline mt-1 hidden" id="cancel-edit-btn" onclick="cancelEdit()">Cancel</button>
            </form>
        </main>

        <nav class="bottom-nav">
            <a href="../" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="../books/" class="nav-item"><i class="fas fa-book"></i><span>Books</span></a>
            <a href="../users/" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="../payments/" class="nav-item"><i class="fas fa-wallet"></i><span>Payments</span></a>
            <a href="./" class="nav-item add-btn active"><i class="fas fa-plus"></i><span>Add</span></a>
        </nav>
    </div>

    <script type="module" src="../admin_script.js"></script>
    
    <script>
        function toggleMultiSelect() {
            document.getElementById('lang-dropdown').classList.toggle('active');
        }

        function updateSelectedLangs() {
            let selected = [];
            document.querySelectorAll('.multi-select-option input:checked').forEach(chk => {
                selected.push(chk.value);
            });
            const hiddenInput = document.getElementById('eb_language');
            const textDisplay = document.getElementById('selected-langs-text');
            
            hiddenInput.value = selected.join(', ');
            
            if(selected.length > 0) {
                textDisplay.innerText = selected.join(', ');
                textDisplay.style.color = 'var(--text)';
            } else {
                textDisplay.innerText = 'Select Languages';
                textDisplay.style.color = 'var(--text3)';
            }
        }

        function togglePriceFields() {
            const isFreeCheckbox = document.getElementById("eb_isfree");
            if (!isFreeCheckbox) return;
            const isFree = isFreeCheckbox.checked;
            const priceDiv = document.getElementById("price-fields");
            if(priceDiv) {
                priceDiv.style.display = isFree ? "none" : "block";
                document.getElementById("eb_price").required = !isFree;
            }
        }

        function cancelEdit() {
            sessionStorage.removeItem('edit_ebook_id');
            window.location.href = '../books/';
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.multi-select-container')) {
                const dropdown = document.getElementById('lang-dropdown');
                if(dropdown) dropdown.classList.remove('active');
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("islamic_admin_auth") === "true") {
                document.getElementById('app-view').classList.remove('hidden');
                
                const phrases = ["سُبْحَانَ اللَّهِ", "الْحَمْدُ لِلَّهِ", "اللَّهُ أَكْبَرُ", "لَا إِلَٰهَ إِلَّا اللَّهُ", "مَا شَاءَ اللَّهُ", "بَارَكَ اللَّهُ فِيكَ"];
                document.getElementById('phrase-ebook').innerText = phrases[Math.floor(Math.random() * phrases.length)];

                const editId = sessionStorage.getItem('edit_ebook_id');
                const submitBtn = document.getElementById('submit-ebook-btn');

                if (editId) {
                    document.getElementById('form-title').innerText = "Edit Ebook";
                    submitBtn.innerHTML = "Update Ebook &#10022;";
                    document.getElementById('cancel-edit-btn').classList.remove('hidden');

                    const cachedData = localStorage.getItem("admin_cache_ebooks");
                    if(cachedData) {
                        try {
                            const books = JSON.parse(cachedData);
                            const ebook = books.find(e => String(e.id) === String(editId));

                            if(ebook) {
                                document.getElementById("ebook_id").value = ebook.id;
                                document.getElementById("eb_title").value = ebook.title;
                                document.getElementById("eb_desc").value = ebook.description;
                                document.getElementById("eb_pdf").value = ebook.pdf_link;
                                document.getElementById("eb_thumb").value = ebook.thumbnail;
                                document.getElementById("eb_isfree").checked = ebook.is_free === true || String(ebook.is_free).toLowerCase() === "true";
                                document.getElementById("eb_price").value = ebook.price || "";
                                document.getElementById("eb_discount").value = ebook.discount_price || "";
                                
                                if (ebook.language) {
                                    document.getElementById("eb_language").value = ebook.language;
                                    let langsArray = ebook.language.split(',').map(l => l.trim());
                                    document.querySelectorAll('.multi-select-option input').forEach(chk => {
                                        chk.checked = langsArray.includes(chk.value);
                                    });
                                    updateSelectedLangs(); 
                                }
                            }
                        } catch(e) {
                            console.error("Cache read error:", e);
                        }
                    }
                    togglePriceFields();
                } else {
                    document.getElementById('form-title').innerText = "Add New Ebook";
                    togglePriceFields();
                }
            } else {
                window.location.replace('../');
            }
        });
    </script>
</body>
</html>
