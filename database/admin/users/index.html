<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Manage Users - Islamic Library by Shekh</title>

    <link rel="icon" href="../hikmahadminlogonew.png">

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../admin_style.css">

    <style>
        .modal-overlay { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 1; visibility: visible; }
        .modal-overlay.hidden { display: flex !important; opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hero-bg"></div><div class="hero-grid"></div><div class="blob blob1"></div><div class="blob blob2"></div>
    <div id="toast-container"></div>
    
    <div id="confirm-overlay" class="modal-overlay hidden">
        <div class="confirm-box">
            <h3 id="confirm-title" style="margin-bottom: 10px; color:var(--text);">Confirm Action</h3>
            <p id="confirm-msg" style="font-size: .9rem; color: var(--text2);">Are you sure?</p>
            <div class="confirm-actions">
                <button class="btn btn-outline" onclick="window.closeConfirm()">Cancel</button>
                <button class="btn" id="confirm-yes-btn">Yes &#10022;</button>
            </div>
        </div>
    </div>
    
    <div id="edit-user-modal" class="modal-overlay hidden">
        <div class="modal-box" style="text-align:left;">
            <h3 id="edit-user-title" style="margin-bottom: 20px;">Edit User Details</h3>
            <form id="editUserForm" onsubmit="event.preventDefault(); window.handleUserUpdate();">
                <input type="hidden" id="edit_user_id">
                <div class="form-group"><label>Full Name</label><input type="text" id="edit_user_name" required></div>
                <div class="form-group"><label>Email ID (Login Username)</label><input type="text" id="edit_user_email" readonly style="background:var(--surface3); cursor:not-allowed; color:var(--text3);"></div>
                <div class="modal-actions" style="margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="window.closeEditUserModal()">Cancel</button>
                    <button type="submit" class="btn" id="update-user-btn">Update User</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="change-password-modal" class="modal-overlay hidden">
        <div class="modal-box" style="text-align:left;">
            <h3 style="margin-bottom: 20px;">Change Admin Password</h3>
            <form id="changePasswordForm" onsubmit="event.preventDefault(); window.handleChangePassword();">
                <div class="form-group"><label>New Password</label><input type="password" id="new_admin_password" required minlength="6" placeholder="Enter new strong password"></div>
                <div class="modal-actions" style="margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="window.closeChangePasswordModal()">Cancel</button>
                    <button type="submit" class="btn">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <header>
            <div class="flex align-center" style="gap: 12px;">
                <i class="fas fa-users" style="color: var(--accent2); font-size: 1.2rem; text-shadow: 0 0 10px var(--glow);"></i>
                <h2>Manage Users</h2>
            </div>
            <div class="flex align-center" style="gap: 20px;">
                <i id="theme-toggle-icon" class="fas fa-moon" style="font-size: 1.2rem; color: var(--text2); cursor: pointer;" onclick="window.toggleTheme()" title="Switch Theme"></i>
                <i class="fas fa-user-circle" style="font-size: 1.3rem; color: var(--text2); cursor: pointer;" onclick="window.openProfileDrawer()" title="Profile"></i>
            </div>
        </header>

        <div id="drawer-overlay" class="drawer-overlay" onclick="window.closeProfileDrawer()"></div>
        <div id="profile-drawer" class="profile-drawer">
            <div class="drawer-header"><h3>Admin Profile</h3><i class="fas fa-times" onclick="window.closeProfileDrawer()"></i></div>
            <div class="drawer-body">
                <div class="drawer-avatar"><i class="fas fa-crown"></i></div>
                <div class="drawer-name" id="profile-name">Admin</div>
                <div class="drawer-mobile" id="profile-email">Administration</div>
                <div class="drawer-menu"><button class="btn btn-outline" onclick="window.openChangePassword()"><i class="fas fa-key"></i> Change Password</button></div>
            </div>
            <div class="drawer-footer"><button class="btn btn-danger" onclick="window.logout()"><i class="fas fa-sign-out-alt"></i> Log Out</button></div>
        </div>

        <main>
            <div class="flex justify-between align-center" style="margin-bottom: 24px;">
                <h3 style="font-size: 1.2rem;">All Users</h3>
                <button class="action-btn-sm" id="refresh-users-btn" onclick="window.forceFetchUsers()" title="Refresh Users"><i class="fas fa-sync-alt"></i></button>
            </div>
            <div id="users-list"></div>
        </main>

        <nav class="bottom-nav">
            <a href="../" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="../books/" class="nav-item"><i class="fas fa-book"></i><span>Books</span></a>
            <a href="./" class="nav-item active"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="../payments/" class="nav-item"><i class="fas fa-wallet"></i><span>Payments</span></a>
            <a href="../new-ebook/" class="nav-item add-btn"><i class="fas fa-plus"></i><span>Add</span></a>
        </nav>
    </div>

    <script type="module" src="../admin_script.js"></script>

    <script>
        window.renderUsersSkeletons = function() {
            const container = document.getElementById("users-list");
            container.innerHTML = "";
            for (let i = 0; i < 5; i++) {
                container.innerHTML += `
                <div class="card skeleton">
                    <div class="ebook-thumb skeleton flex align-center justify-center" style="border-radius: 50%;"></div>
                    <div class="card-details">
                        <div class="skeleton" style="height: 16px; width: 60%;"></div>
                        <div class="skeleton" style="height: 12px; width: 40%;"></div>
                        <div class="skeleton" style="height: 12px; width: 30%;"></div>
                    </div>
                    <div class="flex" style="flex-direction:column; justify-content:center;">
                        <div class="skeleton" style="width: 36px; height: 36px; border-radius: 10px;"></div>
                    </div>
                </div>`;
            }
        }

        window.renderUsers = function(data) {
            const container = document.getElementById("users-list");
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i>No users found.</div>`;
                return;
            }
            container.innerHTML = "";
            data.forEach(user => {
                // ✅ FIX: Removed user.id fallback so it doesn't show Document ID
                const emailDisplay = user.displayId || user.email || user.mobile || 'No Email Found';
                container.innerHTML += `
                <div class="card">
                    <div class="ebook-thumb flex align-center justify-center" style="font-size:1.8rem; color:var(--accent2); background:var(--glow2); border-radius:12px;">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="card-details">
                        <div class="card-title">${user.name || 'Unknown User'}</div>
                        <div class="card-sub" style="font-family:'DM Mono', monospace; font-size:0.75rem;">${emailDisplay}</div>
                        <div class="card-sub"><strong>ID:</strong> ${user.id}</div>
                    </div>
                    <div class="flex" style="flex-direction:column; justify-content:center;">
                        <button class="action-btn-sm" onclick="window.openEditUserModal('${user.id}')" title="Edit User"><i class="fas fa-edit"></i></button>
                    </div>
                </div>`;
            });
        }

        window.openEditUserModal = function(id) {
            const user = window.usersData.find(u => String(u.id) === String(id));
            if (!user) return;
            document.getElementById('edit_user_id').value = user.id;
            document.getElementById('edit_user_name').value = user.name || '';
            // ✅ FIX: Removed user.id fallback here too
            document.getElementById('edit_user_email').value = user.displayId || user.email || user.mobile || 'No Email Found';
            document.getElementById('edit-user-modal').classList.remove('hidden');
        }

        window.closeEditUserModal = function() {
            document.getElementById('edit-user-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
