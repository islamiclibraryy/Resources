<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Admin Dashboard - Hikmah Islamic Store</title>

    <!-- Favicon -->
    <link rel="icon" href="hikmahadminlogo.png">

    <!-- Open Graph -->
    <meta property="og:title" content="Admin Dashboard - Hikmah Islamic Store">
    <meta property="og:description" content="Admin panel for managing Hikmah Islamic Store ebooks and payments.">
    <meta property="og:image" content="hikmahadminlogo.png">
    <meta property="og:url" content="https://islamiclibraryy.github.io/Resources/admin">
    <meta property="og:type" content="website">

    <!-- Google Fonts: Syne, DM Sans, DM Mono, Amiri -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== CSS VARIABLES (Integrated from Reference) ===== */
        :root {
            --bg: #0a0a0f;
            --bg2: #0f0f18;
            --bg3: #13131e;
            --surface: #1a1a28;
            --surface2: #1f1f30;
            --surface3: #252538;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #f0f0f8;
            --text2: #a8a8c0;
            --text3: #686888;
            --accent: #7c6af7;
            --accent2: #9f91fa;
            --accent3: #c4bafe;
            --glow: rgba(124,106,247,0.25);
            --glow2: rgba(124,106,247,0.1);
            --danger: #f43f5e;
            --success: #10b981;
            --amber: #f59e0b;
            --r: 12px;
            --r2: 16px;
            --r3: 20px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow2: 0 8px 40px rgba(0,0,0,0.5);
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);

            /* Fallbacks for older mapped variables */
            --bg-color: var(--bg);
            --surface-color: var(--surface);
            --surface-light: var(--surface2);
            --gold-primary: var(--accent);
            --text-main: var(--text);
            --text-muted: var(--text2);
            --border-radius: var(--r2);
        }

        /* ===== GLOBAL STYLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
        .arabic-text { font-family: 'Amiri', serif; }
        
        h1, h2, h3 { font-family: 'Syne', sans-serif; color: var(--text); font-weight: 700; letter-spacing: -0.02em; }
        .hidden { display: none !important; }
        .flex { display: flex; }
        .align-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .mt-1 { margin-top: 10px; } .mt-2 { margin-top: 20px; }

        /* ===== NOISE OVERLAY ===== */
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            opacity:0.4;
        }

        /* ===== BACKGROUND BLOBS ===== */
        .hero-bg { position:fixed; inset:0; pointer-events:none; z-index:-2; background: radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,106,247,0.2) 0%,transparent 70%), radial-gradient(ellipse 50% 40% at 80% 60%,rgba(168,85,247,0.12) 0%,transparent 60%), radial-gradient(ellipse 40% 30% at 20% 70%,rgba(99,102,241,0.1) 0%,transparent 60%); }
        .hero-grid { position:fixed; inset:0; pointer-events:none; z-index:-1; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,black 40%,transparent 100%); opacity:0.6; }
        .blob { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; animation:blobFloat 8s ease-in-out infinite; z-index:-1; }
        .blob1 { width:400px; height:400px; background:rgba(124,106,247,0.18); top:-100px; left:-100px; animation-delay:0s; }
        .blob2 { width:350px; height:350px; background:rgba(168,85,247,0.12); bottom:-80px; right:-80px; animation-delay:3s; }

        /* ===== LOADER & TOAST ===== */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(5px); z-index: 99999;
            display: flex; justify-content: center; align-items: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid var(--surface3);
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4,0,0.2,1) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toast-container { position: fixed; bottom: 85px; right: 28px; z-index: 9998; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            background: var(--surface); color: var(--text);
            padding: 12px 18px; border-radius: var(--r2); 
            box-shadow: var(--shadow2); border: 1px solid var(--border2);
            animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; 
            display: flex; align-items: center; gap: 10px; font-size: .85rem; font-weight: 500;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px) translateX(110%); } to { opacity: 1; transform: translateX(0); } }

        /* ===== CONFIRM DIALOG ===== */
        #confirm-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(5px); z-index: 9000;
            display: flex; justify-content: center; align-items: center; animation: fadeIn 0.3s ease;
        }
        .confirm-box {
            background: var(--surface); padding: 32px 28px; border-radius: var(--r3);
            width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--border);
            box-shadow: var(--shadow2); animation: cardIn 0.4s ease both;
        }
        .confirm-actions { display: flex; gap: 10px; margin-top: 24px; }
        .confirm-actions button { flex: 1; }

        /* ===== FORMS & BUTTONS ===== */
        input, textarea {
            width: 100%; background: var(--surface2); color: var(--text);
            border: 1px solid var(--border2); padding: 12px 16px; border-radius: var(--r);
            margin-bottom: 16px; font-size: .92rem; transition: var(--transition);
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--glow2); }
        label { display: block; margin-bottom: 6px; font-size: .78rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; text-align: left; }
        
        .btn {
            background: linear-gradient(135deg, #7c6af7, #9f3fbf); color: #fff; border: none;
            padding: 14px 20px; border-radius: 99px; font-weight: 600; font-family: 'DM Sans', sans-serif;
            width: 100%; cursor: pointer; transition: var(--transition); font-size: 1rem; position: relative; overflow: hidden;
            box-shadow: 0 4px 20px rgba(124,106,247,0.4);
        }
        .btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity:0; transition:opacity var(--transition); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,106,247,0.5); }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: translateY(0) scale(0.98); }
        
        .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border2); box-shadow: none; }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent2); background: var(--glow2); box-shadow: none; transform: translateY(-2px); }
        
        .btn-danger { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.3); box-shadow: none; }
        .btn-danger:hover { background: var(--danger); color: #fff; box-shadow: 0 4px 20px rgba(244, 63, 94, 0.4); }
        
        .btn-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: none; }
        .btn-success:hover { background: var(--success); color: #fff; box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4); }

        /* ===== TOGGLE SWITCH ===== */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--surface3); transition: .4s; border-radius: 34px; border: 1px solid var(--border2); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--text2); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); border-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #fff; }

        /* ===== VIEWS ===== */
        #login-view { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; animation: fadeUp .6s ease both; }
        .login-card { background: var(--surface); padding: 32px 28px; border-radius: var(--r3); width: 100%; max-width: 400px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: var(--transition); }
        .login-card:hover { border-color: var(--border2); }
        .login-logo { font-size: 40px; background: linear-gradient(135deg, var(--accent2), #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 10px; }

        header { position: sticky; top: 0; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); z-index: 1000; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); transition: background var(--transition); }
        header h2 { font-size: 1.2rem; margin: 0; font-weight: 700; font-family: 'Syne', sans-serif; }
        .logout-btn { background: transparent; border: none; color: var(--text2); font-size: 1.2rem; cursor: pointer; transition: var(--transition); }
        .logout-btn:hover { color: var(--accent); }

        main { padding: 24px 20px 90px; max-width: 1400px; margin: 0 auto; }
        .tab-content { display: none; animation: fadeIn 0.4s ease both; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
        @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
        @keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,-20px) scale(1.05)} 66%{transform:translate(-15px,15px) scale(0.97)} }

        /* ===== CARDS UI ===== */
        .card { 
            background: var(--surface2); border-radius: var(--r2); padding: 16px; margin-bottom: 16px; 
            display: flex; gap: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); 
            transition: all var(--transition); animation: cardIn .4s ease both;
        }
        .card:hover { border-color: var(--border2); transform: translateY(-2px); }
        .ebook-thumb { width: 75px; height: 75px; border-radius: var(--r); object-fit: cover; aspect-ratio: 1/1; background: var(--surface3); border: 1px solid var(--border); }
        .card-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-title { font-size: .95rem; font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 4px; color: var(--text); }
        .card-sub { font-size: .8rem; color: var(--text2); margin-bottom: 8px; }
        
        .badge { font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 99px; font-size: .7rem; font-weight: 600; display: inline-block; letter-spacing: 0.05em; }
        .badge-free { background: var(--glow2); border: 1px solid rgba(124,106,247,0.3); color: var(--accent3); }
        .badge-price { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--amber); }
        .badge-pending { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--amber); }
        .badge-approved { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--success); }
        .badge-rejected { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.3); color: var(--danger); }

        .action-btn-sm { 
            background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); 
            width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition); 
        }
        .action-btn-sm:hover { background: var(--glow2); color: var(--accent2); border-color: var(--accent); transform: translateY(-2px); }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; 
            background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); z-index: 1000; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-size: .75rem; font-weight: 500; gap: 6px; cursor: pointer; width: 100%; height: 100%; transition: var(--transition); }
        .nav-item i { font-size: 1.2rem; transition: var(--transition); }
        .nav-item.active { color: var(--accent2); }
        .nav-item.active i { background: var(--glow2); padding: 8px; border-radius: 50%; box-shadow: 0 0 15px var(--glow); transform: translateY(-4px); color: var(--accent); }
        .nav-item:hover:not(.active) { color: var(--text2); }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <!-- Global Loader -->
    <div id="loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay" class="hidden">
        <div class="confirm-box">
            <h3 id="confirm-title" style="margin-bottom: 10px; color:var(--text);">Confirm Action</h3>
            <p id="confirm-msg" style="font-size: .9rem; color: var(--text2);">Are you sure?</p>
            <div class="confirm-actions">
                <button class="btn btn-outline" onclick="closeConfirm()">Cancel</button>
                <button class="btn" id="confirm-yes-btn">Yes ✦</button>
            </div>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- LOGIN VIEW -->
    <!-- ============================================== -->
    <div id="login-view">
        <div class="login-card">
            <!-- Bismillah on Login Page -->
            <div class="bismillah arabic-text text-center" style="margin-bottom: 16px;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
            <div class="login-logo"><i class="fas fa-crown"></i></div>
            <h2 style="text-align: center; margin-bottom: 25px;">Admin Login</h2>
            
            <!-- Bulletproof Form: Page will never refresh -->
            <form id="loginForm" onsubmit="event.preventDefault(); handleAdminLogin(); return false;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn mt-1">Secure Login ✦</button>
            </form>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- MAIN APP VIEW -->
    <!-- ============================================== -->
    <div id="app-view" class="hidden">
        <header>
            <div class="flex align-center" style="gap: 12px;">
                <i class="fas fa-shield-alt" style="color: var(--accent2); font-size: 1.2rem; text-shadow: 0 0 10px var(--glow);"></i>
                <h2 id="header-title">Dashboard</h2>
            </div>
            <button class="logout-btn" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </header>

        <main>
            <!-- 1. DASHBOARD TAB -->
            <section id="tab-dashboard" class="tab-content active">
                <div class="bismillah arabic-text text-center" style="margin-bottom: 24px; margin-top: 5px;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
                <div class="flex justify-between align-center" style="margin-bottom: 16px;">
                    <h3 style="font-size: 1.2rem;">All Ebooks</h3>
                    <button class="action-btn-sm" onclick="forceFetchEbooks()" title="Force Refresh"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div id="ebooks-list"></div>
            </section>

            <!-- 2. ADD/EDIT EBOOK TAB -->
            <section id="tab-ebook-form" class="tab-content">
                <div id="phrase-ebook" class="arabic-text text-center" style="font-size: 24px; color: var(--accent2); margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px var(--glow);"></div>
                <h3 id="form-title" style="margin-bottom: 16px; font-size: 1.2rem;">Add New Ebook</h3>
                <div class="card" style="display: block; cursor: default;">
                    
                    <!-- Bulletproof Form -->
                    <form id="ebookForm" onsubmit="event.preventDefault(); handleEbookSubmit(); return false;">
                        <input type="hidden" id="ebook_id">
                        
                        <div class="form-group">
                            <label>Ebook Title</label>
                            <input type="text" id="eb_title" required placeholder="e.g., Mastering JavaScript">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="eb_desc" rows="3" required placeholder="Short description..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>PDF Link (External URL)</label>
                            <input type="url" id="eb_pdf" required placeholder="https://drive.google.com/...">
                        </div>
                        <div class="form-group">
                            <label>Thumbnail Image URL (1:1 Ratio)</label>
                            <input type="url" id="eb_thumb" required placeholder="https://imgur.com/...png">
                        </div>
                        
                        <div class="flex align-center justify-between mt-1" style="margin-bottom: 16px; padding: 12px; background: var(--surface3); border-radius: var(--r); border: 1px solid var(--border2);">
                            <label style="margin:0; font-size:.9rem; color:var(--text); text-transform:none; font-weight:600;">Is this Ebook FREE?</label>
                            <label class="switch">
                                <input type="checkbox" id="eb_isfree" onchange="togglePriceFields()">
                                <span class="slider"></span>
                            </label>
                        </div>

                        <div id="price-fields">
                            <div class="flex" style="gap: 16px;">
                                <div class="form-group" style="flex: 1;"><label>Regular Price (₹)</label><input type="number" step="0.01" id="eb_price" placeholder="0.00"></div>
                                <div class="form-group" style="flex: 1;"><label>Discount Price (₹)</label><input type="number" step="0.01" id="eb_discount" placeholder="0.00"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn mt-2" id="submit-ebook-btn">Save Ebook ✦</button>
                        <button type="button" class="btn btn-outline mt-1 hidden" id="cancel-edit-btn" onclick="resetEbookForm()">Cancel Edit</button>
                    </form>
                </div>
            </section>

            <!-- 3. PAYMENTS TAB -->
            <section id="tab-payments" class="tab-content">
                <div id="phrase-payment" class="arabic-text text-center" style="font-size: 24px; color: var(--accent2); margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px var(--glow);"></div>
                <div class="flex justify-between align-center" style="margin-bottom: 16px;">
                    <h3 style="font-size: 1.2rem;">Payments</h3>
                    <button class="action-btn-sm" onclick="forceFetchPayments()" title="Force Refresh"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div id="payments-list"></div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-book"></i><span>Ebooks</span></div>
            <div class="nav-item" onclick="switchTab('ebook-form', this)"><i class="fas fa-plus-circle"></i><span>Add</span></div>
            <div class="nav-item" onclick="switchTab('payments', this)"><i class="fas fa-wallet"></i><span>Payments</span></div>
        </nav>
    </div>

    <!-- ============================================== -->
    <!-- JAVASCRIPT LOGIC (WITH SMART CACHING) -->
    <!-- ============================================== -->
    <script>
        // === CONFIGURATION ===
        // Yahan par apna exact Web App URL daalein. Quote mark (") mat hatana!
        const API_URL = "https://script.google.com/macros/s/AKfycbzPE32HMSbmeSROZlBqDO7rFWzNhXKFiKhC9diJxn5hWLfqzy2f9ksuejl8J9bM8UJn/exec"; 
        
        // Random Arabic Phrases
        const ARABIC_PHRASES = ["سُبْحَانَ اللَّهِ", "الْحَمْدُ لِلَّهِ", "اللَّهُ أَكْبَرُ", "لَا إِلَٰهَ إِلَّا اللَّهُ", "مَا شَاءَ اللَّهُ", "بَارَكَ اللَّهُ فِيكَ"];

        let confirmCallback = null;
        let ebooksData = [];
        let apiLocks = {}; // SMART LOCK for Caching System

        // === ON LOAD ===
        document.addEventListener("DOMContentLoaded", () => {
            const isLoggedIn = localStorage.getItem("admin_logged_in");
            if (isLoggedIn === "true") showApp();
            else showLogin();
        });

        // === UI UTILITIES ===
        function showLoader() { document.getElementById("loader").classList.remove("hidden"); }
        function hideLoader() { document.getElementById("loader").classList.add("hidden"); }

        function showToast(msg, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            const icon = type === "success" ? '<span style="font-size:1.1rem; color:var(--success)">✓</span>' : '<span style="font-size:1.1rem; color:var(--danger)">✕</span>';
            toast.innerHTML = `${icon} <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { 
                toast.style.transform = "translateX(110%)";
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 400); 
            }, 3000);
        }

        function showConfirm(title, message, onConfirm) {
            document.getElementById("confirm-title").innerText = title;
            document.getElementById("confirm-msg").innerText = message;
            document.getElementById("confirm-overlay").classList.remove("hidden");
            confirmCallback = onConfirm;
        }

        function closeConfirm() {
            document.getElementById("confirm-overlay").classList.add("hidden");
            confirmCallback = null;
        }

        // YES BUTTON Action Map
        document.getElementById("confirm-yes-btn").addEventListener("click", () => {
            if (confirmCallback) confirmCallback();
            closeConfirm();
        });

        // === API WRAPPER ===
        async function apiCall(action, method = "GET", body = null) {
            try {
                if(API_URL.includes("YOUR_GOOGLE_APPS_SCRIPT") || API_URL.includes("example/exec")) {
                    showToast("Please update API_URL in the code first!", "error");
                    return null;
                }

                showLoader();
                const url = method === "GET" ? `${API_URL}?action=${action}` : `${API_URL}?action=${action}`;
                const options = { method: method };
                
                if (method === "POST" && body) {
                    options.body = JSON.stringify(body);
                    options.headers = { "Content-Type": "text/plain;charset=utf-8" };
                }

                const response = await fetch(url, options);
                const data = await response.json();
                hideLoader();
                return data;
            } catch (error) {
                hideLoader();
                console.error("API Error:", error);
                showToast("Network error. Link check karein.", "error");
                return null;
            }
        }

        // === SMART CACHING SYSTEM (2.5 Mins) ===
        async function getCachedData(action, cacheKey) {
            const CACHE_DURATION = 150000; // 2.5 Mins
            const now = new Date().getTime();
            
            const cachedData = localStorage.getItem(cacheKey + "_data");
            const cachedTime = localStorage.getItem(cacheKey + "_time");
            
            // 1. Valid Cache
            if (cachedData && cachedTime && (now - parseInt(cachedTime)) < CACHE_DURATION) {
                return JSON.parse(cachedData);
            }
            
            // 2. Lock check for multiple rapid calls
            if (apiLocks[cacheKey]) return await apiLocks[cacheKey];

            // 3. Fetch fresh API
            apiLocks[cacheKey] = (async () => {
                const data = await apiCall(action, "GET"); 
                if (data) {
                    localStorage.setItem(cacheKey + "_data", JSON.stringify(data));
                    localStorage.setItem(cacheKey + "_time", now.toString());
                }
                delete apiLocks[cacheKey]; 
                return data;
            })();
            
            return await apiLocks[cacheKey];
        }

        // Manual Force Refresh Functions
        function forceFetchEbooks() {
            localStorage.removeItem("admin_cache_ebooks_time"); // Invalidate Cache
            fetchEbooks();
        }

        function forceFetchPayments() {
            localStorage.removeItem("admin_cache_payments_time"); // Invalidate Cache
            fetchPayments();
        }


        // === AUTHENTICATION LOGIC ===
        async function handleAdminLogin() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;

            const res = await apiCall(`adminLogin&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`, "GET");
            if (res && res.success) {
                localStorage.setItem("admin_logged_in", "true");
                showToast("Login Successful!");
                showApp();
            } else {
                showToast("Invalid credentials!", "error");
            }
        }

        function logout() {
            showConfirm("Logout", "Are you sure you want to log out?", () => {
                // Clear Admin Caches on logout
                localStorage.removeItem("admin_cache_ebooks_data");
                localStorage.removeItem("admin_cache_ebooks_time");
                localStorage.removeItem("admin_cache_payments_data");
                localStorage.removeItem("admin_cache_payments_time");
                
                localStorage.removeItem("admin_logged_in");
                showLogin();
            });
        }

        function showLogin() {
            document.getElementById("login-view").classList.remove("hidden");
            document.getElementById("app-view").classList.add("hidden");
            document.getElementById("loginForm").reset();
        }

        function showApp() {
            document.getElementById("login-view").classList.add("hidden");
            document.getElementById("app-view").classList.remove("hidden");
            fetchEbooks();
        }

        // === NAVIGATION ===
        function switchTab(tabName, navElement) {
            document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
            if(navElement) navElement.classList.add("active");

            const headers = { "dashboard": "Ebooks", "ebook-form": "Manage Ebook", "payments": "Payments" };
            document.getElementById("header-title").innerText = headers[tabName];

            if (tabName === "ebook-form") document.getElementById("phrase-ebook").innerText = ARABIC_PHRASES[Math.floor(Math.random() * ARABIC_PHRASES.length)];
            if (tabName === "payments") document.getElementById("phrase-payment").innerText = ARABIC_PHRASES[Math.floor(Math.random() * ARABIC_PHRASES.length)];

            document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
            document.getElementById(`tab-${tabName}`).classList.add("active");

            if (tabName === "dashboard") fetchEbooks();
            if (tabName === "payments") fetchPayments();
            if (tabName === "ebook-form" && !document.getElementById("ebook_id").value) resetEbookForm();
        }

        // === EBOOK MANAGEMENT ===
        function togglePriceFields() {
            const isFree = document.getElementById("eb_isfree").checked;
            const priceDiv = document.getElementById("price-fields");
            if (isFree) {
                priceDiv.style.display = "none";
                document.getElementById("eb_price").removeAttribute("required");
            } else {
                priceDiv.style.display = "block";
                document.getElementById("eb_price").setAttribute("required", "true");
            }
        }

        async function fetchEbooks() {
            const res = await getCachedData("getEbooks", "admin_cache_ebooks");
            if (res && Array.isArray(res)) {
                ebooksData = res;
                renderEbooks();
            }
        }

        function renderEbooks() {
            const container = document.getElementById("ebooks-list");
            container.innerHTML = "";
            if (ebooksData.length === 0) {
                container.innerHTML = `<div class="text-center" style="margin-top: 40px; color:var(--text3); animation: fadeUp .5s ease both;">
                    <div style="width: 60px; height: 60px; border-radius: 50%; background: var(--glow2); border: 1px solid rgba(124,106,247,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 16px auto; color: var(--accent2);">📚</div>
                    <p style="font-size: .85rem;">No ebooks found. Add one!</p>
                </div>`;
                return;
            }

            ebooksData.forEach(eb => {
                const isFree = eb.is_free === true || String(eb.is_free).toLowerCase() === "true";
                const badge = isFree ? `<span class="badge badge-free">✦ FREE</span>` : `<span class="badge badge-price">₹${eb.discount_price || eb.price}</span>`;
                container.innerHTML += `
                <div class="card">
                    <img src="${eb.thumbnail}" class="ebook-thumb">
                    <div class="card-details">
                        <div class="card-title">${eb.title}</div>
                        <div class="card-sub">${eb.description.substring(0, 40)}...</div>
                        <div>${badge}</div>
                    </div>
                    <div style="display:flex; flex-direction:column; justify-content:center;">
                        <button class="action-btn-sm" onclick="editEbook('${eb.id}')" title="Edit Ebook"><i class="fas fa-edit"></i></button>
                    </div>
                </div>`;
            });
        }

        async function handleEbookSubmit() {
            const isFree = document.getElementById("eb_isfree").checked;
            const payload = {
                title: document.getElementById("eb_title").value,
                description: document.getElementById("eb_desc").value,
                pdf_link: document.getElementById("eb_pdf").value,
                thumbnail: document.getElementById("eb_thumb").value,
                is_free: isFree,
                price: isFree ? 0 : parseFloat(document.getElementById("eb_price").value || 0),
                discount_price: isFree ? 0 : parseFloat(document.getElementById("eb_discount").value || 0)
            };

            const id = document.getElementById("ebook_id").value;
            let action = "addEbook";
            if (id) { action = `updateEbook&id=${id}`; payload.id = id; }

            const res = await apiCall(action, "POST", payload);
            if (res && res.success) {
                showToast(id ? "Ebook Updated!" : "Ebook Added!");
                
                // SMART INVALIDATION: Clear cache so Dashboard shows new ebook instantly
                localStorage.removeItem("admin_cache_ebooks_time");
                
                resetEbookForm();
                switchTab('dashboard', document.querySelector(".nav-item:nth-child(1)"));
            } else { showToast("Operation failed.", "error"); }
        }

        function editEbook(id) {
            const eb = ebooksData.find(e => String(e.id) === String(id));
            if (!eb) return;
            document.getElementById("form-title").innerText = "Edit Ebook";
            document.getElementById("ebook_id").value = eb.id;
            document.getElementById("eb_title").value = eb.title;
            document.getElementById("eb_desc").value = eb.description;
            document.getElementById("eb_pdf").value = eb.pdf_link;
            document.getElementById("eb_thumb").value = eb.thumbnail;
            document.getElementById("eb_isfree").checked = eb.is_free === true || String(eb.is_free).toLowerCase() === "true";
            document.getElementById("eb_price").value = eb.price || "";
            document.getElementById("eb_discount").value = eb.discount_price || "";
            
            togglePriceFields();
            document.getElementById("submit-ebook-btn").innerHTML = "Update Ebook ✦";
            document.getElementById("cancel-edit-btn").classList.remove("hidden");
            switchTab('ebook-form', document.querySelector(".nav-item:nth-child(2)"));
        }

        function resetEbookForm() {
            document.getElementById("ebookForm").reset();
            document.getElementById("ebook_id").value = "";
            document.getElementById("form-title").innerText = "Add New Ebook";
            document.getElementById("submit-ebook-btn").innerHTML = "Save Ebook ✦";
            document.getElementById("cancel-edit-btn").classList.add("hidden");
            togglePriceFields();
        }

        // === PAYMENT MANAGEMENT ===
        async function fetchPayments() {
            const res = await getCachedData("getPayments", "admin_cache_payments");
            if (res && Array.isArray(res)) renderPayments(res);
        }

        function renderPayments(payments) {
            const container = document.getElementById("payments-list");
            container.innerHTML = "";
            if (payments.length === 0) {
                container.innerHTML = `<div class="text-center" style="margin-top: 40px; color:var(--text3); animation: fadeUp .5s ease both;">
                    <div style="width: 60px; height: 60px; border-radius: 50%; background: var(--glow2); border: 1px solid rgba(124,106,247,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 16px auto; color: var(--accent2);">💳</div>
                    <p style="font-size: .85rem;">No payments found.</p>
                </div>`;
                return;
            }

            payments.forEach(pay => {
                let badgeClass = "badge-pending";
                let statusText = (pay.status || "pending").toUpperCase();
                if (statusText === "APPROVED") badgeClass = "badge-approved";
                if (statusText === "REJECTED") badgeClass = "badge-rejected";

                let actionButtons = `<div style="display:flex; gap:10px; margin-top:12px; width:100%;">`;
                
                if (statusText === "PENDING") {
                    actionButtons += `
                        <button class="btn btn-success" style="padding:10px; font-size:.8rem; border-radius:10px; flex:1;" onclick="handlePaymentStatus('${pay.id}', 'approved')"><i class="fas fa-check"></i> Approve</button>
                        <button class="btn btn-danger" style="padding:10px; font-size:.8rem; border-radius:10px; flex:1;" onclick="handlePaymentStatus('${pay.id}', 'rejected')"><i class="fas fa-times"></i> Reject</button>`;
                } else if (statusText === "APPROVED") {
                    actionButtons += `<button class="btn btn-outline" style="padding:10px; font-size:.8rem; border-radius:10px; flex:1; color: var(--danger); border-color: rgba(244, 63, 94, 0.4);" onclick="handlePaymentStatus('${pay.id}', 'rejected')"><i class="fas fa-undo" style="margin-right:6px;"></i> Change to Reject</button>`;
                } else if (statusText === "REJECTED") {
                    actionButtons += `<button class="btn btn-outline" style="padding:10px; font-size:.8rem; border-radius:10px; flex:1; color: var(--success); border-color: rgba(16, 185, 129, 0.4);" onclick="handlePaymentStatus('${pay.id}', 'approved')"><i class="fas fa-undo" style="margin-right:6px;"></i> Change to Approve</button>`;
                }
                actionButtons += `</div>`;

                container.innerHTML += `
                <div class="card" style="flex-direction:column; gap:6px; cursor: default;">
                    <div class="flex justify-between align-center">
                        <div class="card-title" style="margin:0; font-family:'DM Mono', monospace; font-size:1.05rem;">Txn: ${pay.txn_id}</div>
                        <span class="badge ${badgeClass}">${statusText}</span>
                    </div>
                    <div class="card-sub" style="margin:0;"><strong>User ID:</strong> ${pay.user_id}</div>
                    <div class="card-sub" style="margin:0;"><strong>Ebook ID:</strong> ${pay.ebook_id}</div>
                    ${actionButtons}
                </div>`;
            });
        }

        function handlePaymentStatus(paymentId, status) {
            showConfirm(`Update Payment`, `Are you sure you want to mark this transaction as ${status.toUpperCase()}?`, async () => {
                const payload = { payment_id: paymentId, status: status };
                const res = await apiCall("updatePaymentStatus", "POST", payload);
                if (res && res.success) {
                    showToast(`Payment successfully marked as ${status}!`, "success");
                    
                    // SMART INVALIDATION: Clear cache to force refresh list
                    localStorage.removeItem("admin_cache_payments_time");
                    
                    fetchPayments();
                } else { showToast("Failed to update status.", "error"); }
            });
        }

        togglePriceFields();
    </script>
</body>
</html>
