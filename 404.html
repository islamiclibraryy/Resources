            document.getElementById("profile-drawer").classList.add("active");
            document.body.style.overflow = 'hidden';

            const userId = localStorage.getItem("islamic_user_id");
            const authActions = document.getElementById("auth-actions");
            const drawerFooter = document.getElementById("drawer-footer");
            
            const loginPath = '/login/';

            if (userId) {
                        // 🔥 Naya Avatar Logic start
        const avatarContainer = document.querySelector(".drawer-avatar");
        const cachedPhoto = localStorage.getItem("islamic_user_photo");

        if (cachedPhoto && cachedPhoto !== "null") {
            avatarContainer.innerHTML = `<img src="${cachedPhoto}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" onerror="this.outerHTML='<i id=\\'profile-avatar-icon\\' class=\\'fas fa-user\\'></i>'">`;
        } else {
            avatarContainer.innerHTML = `<i id="profile-avatar-icon" class="fas fa-user"></i>`;
        }
        // 🔥 Naya Avatar Logic end
 
                let cachedName = localStorage.getItem("islamic_user_name");
                document.getElementById("profile-name").innerText = cachedName || "Library User";
                document.getElementById("profile-mobile").innerText = localStorage.getItem("islamic_user_mobile") || "Registered User";
                
                authActions.innerHTML = `<button class="btn btn-outline" onclick="window.openChangePassword()"><i class="fas fa-key"></i> Change Password</button>`;
                drawerFooter.innerHTML = `<button class="btn" style="background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.3); box-shadow: none;" onclick="window.showLogoutModal()"><i class="fas fa-sign-out-alt"></i> Log Out</button>`;

                if (!cachedName) {
                    try {
                        const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                        const dbInstance = getFirestore();
                        const userDoc = await getDoc(doc(dbInstance, "users", userId));
                        if (userDoc.exists() && userDoc.data().name) {
                            localStorage.setItem("islamic_user_name", userDoc.data().name);
                            document.getElementById("profile-name").innerText = userDoc.data().name;
                        }
                    } catch(e) {}
                }
            } else {
                document.getElementById("profile-avatar-icon").className = "fas fa-user-shield";
                document.getElementById("profile-name").innerText = "Guest User";
                document.getElementById("profile-mobile").innerText = "Welcome to Islamic Library";
                authActions.innerHTML = ``;
                drawerFooter.innerHTML = `<button class="btn" onclick="window.location.href='${loginPath}'"><i class="fas fa-sign-in-alt"></i> Login / Sign Up</button>`;
            }
        };

        window.closeProfileDrawer = function() {
            document.getElementById("drawer-overlay").classList.remove("active");
            document.getElementById("profile-drawer").classList.remove("active");
            document.body.style.overflow = '';
        };

        window.closeModal = function() { document.getElementById("confirm-modal").classList.add("hidden"); };

        window.showLogoutModal = function() {
            window.closeProfileDrawer();
            document.getElementById("modal-action-btn").onclick = window.confirmLogout;
            document.getElementById("confirm-modal").classList.remove("hidden");
        };

        window.openChangePassword = function() {
            window.closeProfileDrawer();
            document.getElementById("change-password-modal").classList.remove("hidden");
            document.getElementById("user_new_password").value = ""; 
        }

        window.closeChangePasswordModal = function() { document.getElementById("change-password-modal").classList.add("hidden"); }

        window.showToast = function(msg, type = "success") {
            const container = document.getElementById("toast-container");
            if (!container) return;
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = (type === "success" ? '<span style="font-size:1.1rem; color:var(--success)">✓</span>' : '<span style="font-size:1.1rem; color:var(--danger)">✕</span>') + ` <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.transform = "translateX(110%)"; toast.style.opacity = "0"; setTimeout(() => toast.remove(), 400); }, 3000);
        }

        window.executeChangePassword = async function() {
            const newPass = document.getElementById("user_new_password").value.trim();
            const btn = document.getElementById("update-pass-btn");
            if (newPass.length < 6) return window.showToast("Password must be at least 6 characters!", "error");

            const { getAuth, updatePassword } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js");
            const user = getAuth().currentUser;
            if (!user) return window.showToast("Session expired. Please login again.", "error");

            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;
                await updatePassword(user, newPass);
                window.showToast("Password updated successfully!", "success");
                window.closeChangePasswordModal();
            } catch (error) {
                if (error.code === 'auth/requires-recent-login') window.showToast("Security alert: Logout and login again to change password.", "error");
                else window.showToast("Error: " + error.message, "error");
            } finally { btn.innerHTML = 'Update'; btn.disabled = false; }
        }

        window.confirmLogout = function() { window.executeLogout(true); };
        window.executeLogout = function(redirect) {
            const userId = localStorage.getItem("islamic_user_id");
            if(userId) { localStorage.removeItem(`cache_payments_${userId}_data`); localStorage.removeItem(`cache_payments_${userId}_time`); }
            localStorage.removeItem("islamic_user_id"); localStorage.removeItem("islamic_user_name"); localStorage.removeItem("islamic_user_mobile");
            
            const loginPath = '/login/';

            signOut(auth).then(() => { if(redirect) window.location.href = loginPath; })
                         .catch(() => { if(redirect) window.location.href = loginPath; });
        };

        let touchstartX = 0; let touchstartY = 0; let touchendX = 0; let touchendY = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; touchstartY = e.changedTouches[0].screenY; }, {passive: true});
        document.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; touchendY = e.changedTouches[0].screenY; window.handleSwipe(); }, {passive: true});
        
        window.handleSwipe = function() {
            if (document.getElementById("profile-drawer").classList.contains("active")) return;
            if (Math.abs(touchendY - touchstartY) > 50) return;
            
            const libraryPath = '/';
            if (touchendX > touchstartX + 70) window.location.href = libraryPath;
        };

        document.addEventListener("DOMContentLoaded", () => { window.initTheme(); });
    </script>
</body>
</html>
