        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 999; transition: background-color 0.3s ease, border-color 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } } @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } } @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwFOJPFMQXvgBQ34PpH4RKFBC0ERSvXwNPyj4jExXZLhtKQUJSoja4VqRRSL-EkqREC/exec"; 
        const ARABIC_PHRASES = ["سُبْحَانَ اللَّهِ", "الْحَمْدُ لِلَّهِ", "اللَّهُ أَكْبَرُ", "لَا إِلَٰهَ إِلَّا اللَّهُ", "مَا شَاءَ اللَّهُ", "بَارَكَ اللَّهُ فِيكَ"];

        let userPayments = [];
        let currentEbook = null;
        let apiLocks = {};
        const userId = localStorage.getItem("islamic_user_id");

        function initTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const icon = document.getElementById("theme-toggle-icon");
            if(icon) icon.className = currentTheme === "light" ? "fas fa-sun" : "fas fa-moon";
        }
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "light" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("islamic_theme", newTheme);
            initTheme();
        }

        function openProfileDrawer() {
            document.getElementById("profile-name").innerText = localStorage.getItem("islamic_user_name") || "Library User";
            document.getElementById("profile-mobile").innerText = localStorage.getItem("islamic_user_mobile") || "Registered User";
            document.getElementById("drawer-overlay").classList.add("active");
            document.getElementById("profile-drawer").classList.add("active");
        }
        function closeProfileDrawer() {
            document.getElementById("drawer-overlay").classList.remove("active");
            document.getElementById("profile-drawer").classList.remove("active");
        }
        function closeModal() { document.getElementById("confirm-modal").classList.add("hidden"); }
        function showLogoutModal() {
            closeProfileDrawer();
            document.getElementById("modal-title-text").innerText = "Log Out";
            document.getElementById("modal-desc-text").innerText = "Are you sure you want to log out of your account?";
            const actionBtn = document.getElementById("modal-action-btn");
            actionBtn.innerText = "Yes, Log Out";
            actionBtn.onclick = confirmLogout;
            document.getElementById("confirm-modal").classList.remove("hidden");
        }
        function openChangePassword() {
            closeProfileDrawer();
            document.getElementById("modal-title-text").innerText = "Change Password";
            document.getElementById("modal-desc-text").innerText = "You will be logged out securely to change your password. Continue?";
            const actionBtn = document.getElementById("modal-action-btn");
            actionBtn.innerText = "Yes, Continue";
            actionBtn.onclick = () => {
                closeModal();
                executeLogout(false); 
                sessionStorage.setItem("open_reset_tab", "true");
                window.location.href = "index.html"; 
            };
            document.getElementById("confirm-modal").classList.remove("hidden");
        }
        function confirmLogout() { executeLogout(true); }
        function executeLogout(redirect) {
            if(userId) { localStorage.removeItem(`cache_payments_${userId}_data`); localStorage.removeItem(`cache_payments_${userId}_time`); }
            localStorage.removeItem("islamic_user_id"); localStorage.removeItem("islamic_user_name"); localStorage.removeItem("islamic_user_mobile");
            if(redirect) window.location.href = "index.html";
        }

        let touchstartX = 0; let touchstartY = 0; let touchendX = 0; let touchendY = 0;
        document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; touchstartY = e.changedTouches[0].screenY; }, {passive: true});
        document.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; touchendY = e.changedTouches[0].screenY; handleSwipe(); }, {passive: true});
        function handleSwipe() {
            if (document.getElementById("profile-drawer").classList.contains("active")) return;
            if (Math.abs(touchendY - touchstartY) > 50) return; 
            if (touchendX > touchstartX + 70) window.location.href = 'index.html'; 
        }

        function showLoader() { document.getElementById("loader").classList.remove("hidden"); }
        function hideLoader() { document.getElementById("loader").classList.add("hidden"); }
        function showToast(msg, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div"); toast.className = "toast";
            toast.innerHTML = (type === "success" ? '<span style="font-size:1.1rem; color:var(--success)">✓</span>' : '<span style="font-size:1.1rem; color:var(--danger)">✕</span>') + ` <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.transform = "translateX(110%)"; toast.style.opacity = "0"; setTimeout(() => toast.remove(), 400); }, 3000);
        }

        async function apiCall(action, method = "GET", body = null, isBackground = false) {
            const url = `${API_URL}?action=${action}`;
            const options = { method: method };
            if (method === "POST" && body) { options.body = JSON.stringify(body); options.headers = { "Content-Type": "text/plain;charset=utf-8" }; }
            try {
                if (!isBackground) showLoader();
                const response = await fetch(url, options);
                const data = await response.json();
                if (!isBackground) hideLoader();
                return data;
            } catch (error) {
                if (!isBackground) hideLoader();
                if (!isBackground) showToast("Network Error", "error");
                return null;
            }
        }

        function fetchSWR(action, cacheKey, onDataChange, showBlockingLoader = false) {
            const now = new Date().getTime();
            const cachedDataStr = localStorage.getItem(cacheKey + "_data");
            let hasCache = false;
            if (cachedDataStr) { hasCache = true; try { onDataChange(JSON.parse(cachedDataStr)); } catch (e) { hasCache = false; } }
            if (!hasCache && showBlockingLoader) showLoader();
            if (apiLocks[cacheKey]) return;
            apiLocks[cacheKey] = true;
            apiCall(action, "GET", null, true).then(freshData => {
                if (freshData) {
                    const freshDataStr = JSON.stringify(freshData);
                    if (cachedDataStr !== freshDataStr) {
                        localStorage.setItem(cacheKey + "_data", freshDataStr); localStorage.setItem(cacheKey + "_time", now.toString()); onDataChange(freshData); 
                    } else { localStorage.setItem(cacheKey + "_time", now.toString()); }
                }
            }).finally(() => { if (!hasCache && showBlockingLoader) hideLoader(); delete apiLocks[cacheKey]; });
        }

        document.addEventListener("DOMContentLoaded", () => {
            initTheme();
            initBook();
        });

        function shareBook() {
            if (!currentEbook) return;
            const siteUrl = window.location.origin + window.location.pathname.replace('books.html', 'index.html');
            const shareText = `📚 Check out this Islamic eBook: "${currentEbook.title}" on Islamic Library by Shekh.\n\n${siteUrl}`;
            if (navigator.share) {
                navigator.share({ title: currentEbook.title, text: shareText }).catch((error) => console.log('Error sharing:', error));
            } else {
                if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(shareText).then(() => showToast("Link copied to clipboard!")); } 
                else {
                    let textArea = document.createElement("textarea"); textArea.value = shareText; textArea.style.position = "fixed"; document.body.appendChild(textArea); textArea.focus(); textArea.select();
                    try { document.execCommand('copy'); showToast("Link copied to clipboard!"); } catch (err) { showToast("Failed to copy link", "error"); } textArea.remove();
                }
            }
        }

        function initBook() {
            const bookDataStr = sessionStorage.getItem("selected_book_data");
            if(bookDataStr) {
                currentEbook = JSON.parse(bookDataStr);
                let currentPayments = [];
                const cachedPayments = localStorage.getItem(`cache_payments_${userId}_data`);
                if(cachedPayments) { try { currentPayments = JSON.parse(cachedPayments); } catch(e) {} }
                userPayments = currentPayments;

                renderDetail();
                fetchSWR(`getUserPayments&user_id=${userId}`, `cache_payments_${userId}`, (data) => {
                    if (Array.isArray(data)) { userPayments = data; renderDetail(); }
                }, false);
            } else {
                window.location.replace("index.html");
            }
        }

        function renderDetail() {
            document.getElementById("action-footer").classList.remove("hidden");

            document.getElementById("det-thumb").src = currentEbook.thumbnail;
            document.getElementById("det-title").innerText = currentEbook.title;
            document.getElementById("det-desc").innerText = currentEbook.description;

            if(!document.getElementById("det-arabic-phrase").innerText) {
                document.getElementById("det-arabic-phrase").innerText = ARABIC_PHRASES[Math.floor(Math.random() * ARABIC_PHRASES.length)];
            }

            const isFree = String(currentEbook.is_free) === "true";
            const priceBox = document.getElementById("det-price-box");
            const footerPrice = document.getElementById("det-footer-price");
            const actionBtn = document.getElementById("det-action-btn");
            
            const ownedBook = userPayments.find(p => String(p.ebook_id) === String(currentEbook.id) && p.status.toLowerCase() !== "rejected");

            if (isFree) {
                priceBox.innerHTML = `<span class="badge-free" style="padding: 6px 16px; font-size: .85rem;">✦ 100% FREE</span>`;
            } else {
                let pHTML = `₹${currentEbook.discount_price || currentEbook.price}`;
                if (currentEbook.discount_price && currentEbook.price > currentEbook.discount_price) pHTML += ` <span class="strike-price">₹${currentEbook.price}</span>`;
                priceBox.innerHTML = `<span class="price-tag" style="font-size: 1.6rem;">${pHTML}</span>`;
            }

            actionBtn.className = "btn"; actionBtn.disabled = false; actionBtn.style.background = ""; actionBtn.style.color = ""; actionBtn.style.boxShadow = "";

            if (ownedBook) {
                if (ownedBook.status.toLowerCase() === "approved") {
                    footerPrice.innerHTML = "Owned";
                    actionBtn.innerHTML = `<i class="fas fa-download"></i> Download`;
                    actionBtn.onclick = () => window.open(currentEbook.pdf_link, "_blank");
                    actionBtn.style.background = "var(--success)"; actionBtn.style.boxShadow = "0 4px 20px rgba(16,185,129,0.3)"; actionBtn.style.color = "#fff";
                } else {
                    footerPrice.innerHTML = "In Verification";
                    actionBtn.innerHTML = `<i class="fas fa-hourglass-half spin"></i> Verifying...`;
                    actionBtn.disabled = true; actionBtn.onclick = null;
                }
            } else if (isFree) {
                footerPrice.innerHTML = "Free";
                actionBtn.innerHTML = `<i class="fas fa-download"></i> Download`;
                actionBtn.onclick = () => window.open(currentEbook.pdf_link, "_blank");
            } else {
                footerPrice.innerHTML = `₹${currentEbook.discount_price || currentEbook.price}`;
                actionBtn.innerHTML = `Buy Now <i class="fas fa-arrow-right" style="margin-left:6px;"></i>`;
                actionBtn.style.background = "linear-gradient(135deg, #7c6af7, #9f3fbf)"; actionBtn.style.color = "#fff";
                
                // ✅ DIRECT TO PAYMENTS.HTML
                actionBtn.onclick = () => window.location.href = 'payments.html';
            }
        }
    </script>
</body>
</html>
