    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg: #0a0a0f; --bg2: #0f0f18; --bg3: #13131e;
            --surface: #1a1a28; --surface2: #1f1f30; --surface3: #252538;
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
            --text: #f0f0f8; --text2: #a8a8c0; --text3: #686888;
            --accent: #7c6af7; --accent2: #9f91fa; --accent3: #c4bafe;
            --glow: rgba(124,106,247,0.25); --glow2: rgba(124,106,247,0.1);
            --danger: #f43f5e; --success: #10b981; --amber: #f59e0b;
            --r: 12px; --r2: 16px; --r3: 20px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4); --shadow2: 0 8px 40px rgba(0,0,0,0.5);
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }

        /* ===== LIGHT MODE VARIABLES ===== */
        [data-theme="light"] {
            --bg: #f4f6f8; --bg2: #e9ecef; --bg3: #dee2e6;
            --surface: #ffffff; --surface2: #f8f9fa; --surface3: #e9ecef;
            --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
            --text: #1a1b1e; --text2: #495057; --text3: #868e96;
            --accent: #6366f1; --accent2: #4f46e5; --accent3: #4338ca;
            --glow: rgba(99,102,241,0.15); --glow2: rgba(99,102,241,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.06); --shadow2: 0 8px 30px rgba(0,0,0,0.1);
        }
        
        [data-theme="light"] .blob { opacity: 0.5; }
        [data-theme="light"] header, [data-theme="light"] .bottom-nav { background: rgba(255, 255, 255, 0.9); border-bottom-color: rgba(0,0,0,0.1); border-top-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .profile-drawer { background: #fff; }

        /* ===== GLOBAL STYLES ===== */
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; min-height: 100vh; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s ease; }
        
        body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); opacity:0.4; }

        .hero-bg { position:fixed; inset:0; pointer-events:none; z-index:-2; background: radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,106,247,0.2) 0%,transparent 70%), radial-gradient(ellipse 50% 40% at 80% 60%,rgba(168,85,247,0.12) 0%,transparent 60%), radial-gradient(ellipse 40% 30% at 20% 70%,rgba(99,102,241,0.1) 0%,transparent 60%); }
        .hero-grid { position:fixed; inset:0; pointer-events:none; z-index:-1; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,black 40%,transparent 100%); opacity:0.6; }
        .blob { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; animation:blobFloat 8s ease-in-out infinite; z-index:-1; }
        .blob1 { width:400px; height:400px; background:rgba(124,106,247,0.18); top:-100px; left:-100px; animation-delay:0s; }
        .blob2 { width:350px; height:350px; background:rgba(168,85,247,0.12); bottom:-80px; right:-80px; animation-delay:3s; }
        .blob3 { width:250px; height:250px; background:rgba(99,102,241,0.1); top:40%; right:10%; animation-delay:5s; }

        h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
        .hidden { display: none !important; } .flex { display: flex; } .align-center { align-items: center; } .text-center { text-align: center; } .mb-2 { margin-bottom: 20px; }

        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,15,0.85); backdrop-filter: blur(5px); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--surface3); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s cubic-bezier(0.4,0,0.2,1) infinite; }
        #toast-container { position: fixed; bottom: 85px; right: 28px; z-index: 9998; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--surface); color: var(--text); padding: 12px 18px; border-radius: var(--r2); box-shadow: var(--shadow2); border: 1px solid var(--border2); animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; display: flex; align-items: center; gap: 10px; font-size: .85rem; font-weight: 500; }

        .btn { background: linear-gradient(135deg, #7c6af7, #9f3fbf); color: #fff; border: none; padding: 14px 20px; border-radius: 99px; font-weight: 600; font-family: 'DM Sans', sans-serif; width: 100%; cursor: pointer; transition: var(--transition); font-size: 1rem; display: block; text-align: center; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(124,106,247,0.4); }
        .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border2); padding: 10px 20px; border-radius: 99px; font-weight: 500; font-size: .85rem; transition: var(--transition); cursor: pointer; box-shadow: none; }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent2); background: var(--glow2); }

        /* ✅ LOGOUT CONFIRMATION MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,15,0.85); backdrop-filter: blur(5px); z-index: 99999; display: flex; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
        .modal-box { background: var(--surface); padding: 28px 24px; border-radius: var(--r3); width: 90%; max-width: 320px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow2); animation: cardIn 0.4s ease both; }
        .modal-title { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
        .modal-desc { font-size: 0.9rem; color: var(--text2); margin-bottom: 24px; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-actions button { flex: 1; padding: 12px; font-size: 0.9rem; }

        /* ===== SKELETON LOADERS ===== */
        .skeleton { background: linear-gradient(90deg, var(--surface3) 25%, var(--surface2) 50%, var(--surface3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* ✅ FIXED HEADER */
        header { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
            padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--border); 
            transition: background-color 0.3s ease, border-color 0.3s ease; 
            transform: translateZ(0); 
        }
        .header-logo-container { display: flex; flex-direction: column; justify-content: center; }
        .header-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; background: linear-gradient(135deg, var(--accent2), #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; letter-spacing: -0.02em; }
        .header-sub { font-family: 'DM Mono', monospace; font-size: .7rem; font-weight: 500; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
        
        .main-content { padding: 90px 20px 90px; max-width: 1400px; margin: 0 auto; animation: fadeIn .5s ease both; }
        
        /* ✅ PROFILE DRAWER UI (MATCHED WITH INFO.HTML) */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10001; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(3px); }
        .drawer-overlay.active { opacity: 1; pointer-events: all; }
        
        /* Fixed height using 100% and 100dvh for mobile address bar fixing */
        .profile-drawer { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; height: 100dvh; background: var(--surface); z-index: 10002; box-shadow: -5px 0 30px rgba(0,0,0,0.5); transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .profile-drawer.active { right: 0; }
        
        .drawer-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0;}
        .drawer-header h3 { margin: 0; font-size: 1.2rem; }
        .drawer-header i { font-size: 1.2rem; color: var(--text2); cursor: pointer; padding: 5px; }
        
        /* Drawer body is scrollable so footer is always pushed to bottom */
        .drawer-body { padding: 30px 20px; text-align: center; flex: 1; overflow-y: auto; }
        .drawer-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--glow2); border: 2px solid var(--accent); color: var(--accent2); font-size: 2.5rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; }
        .drawer-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
        .drawer-mobile { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--text2); margin-bottom: 30px; letter-spacing: 0.05em; }
        
        .drawer-menu .btn-outline { width: 100%; text-align: left; padding: 14px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; border-color: var(--border); }
        .drawer-menu .btn-outline i { width: 20px; text-align: center; font-size: 1.1rem; }
        
        /* Footer stays at bottom, added safe-area padding for iPhone bottom bar */
        .drawer-footer { padding: 20px; border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

        /* Library Specific */
        .lib-card { background: var(--surface2); border-radius: var(--r2); padding: 16px; margin-bottom: 16px; display: flex; gap: 16px; border: 1px solid var(--border); align-items: center; transition: all var(--transition); animation: cardIn .4s ease both; box-shadow: var(--shadow); }
        .lib-card:hover { border-color: var(--border2); transform: translateY(-2px); }
        .lib-thumb { width: 75px; height: 75px; border-radius: var(--r); object-fit: cover; border: 1px solid var(--border); }
        .lib-info { flex: 1; }
        .status-badge { font-size: .7rem; padding: 4px 10px; border-radius: 99px; font-weight: 600; display: inline-block; margin-top: 6px; letter-spacing: 0.05em; font-family: 'DM Mono', monospace; }
        .status-pending { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: var(--amber); }
        .status-approved { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--success); }
        .status-rejected { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.3); color: var(--danger); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 999; transition: background-color 0.3s ease, border-color 0.3s ease; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-size: .75rem; font-weight: 500; gap: 6px; cursor: pointer; flex: 1; height: 100%; transition: all var(--transition); text-decoration: none; }
        .nav-item i { font-size: 1.2rem; transition: all var(--transition); }
        .nav-item.active { color: var(--accent2); }
        .nav-item.active i { background: var(--glow2); padding: 8px; border-radius: 50%; box-shadow: 0 0 15px var(--glow); transform: translateY(-4px); color: var(--accent); }
        .nav-item:hover:not(.active) { color: var(--text2); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } } @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } } @keyframes slideUp { from { opacity: 0; transform: translateY(20px) translateX(110%); } to { opacity: 1; transform: translateX(0); } } @keyframes spin { to { transform: rotate(360deg); } } @keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,-20px) scale(1.05)} 66%{transform:translate(-15px,15px) scale(0.97)} }
    </style>
</head>
<body>

    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div id="loader" class="hidden"><div class="spinner"></div></div>
    <div id="toast-container"></div>

    <!-- ✅ PROFILE DRAWER -->
    <div id="drawer-overlay" class="drawer-overlay" onclick="closeProfileDrawer()"></div>
    <div id="profile-drawer" class="profile-drawer">
        <div class="drawer-header">
            <h3>My Profile</h3>
            <i class="fas fa-times" onclick="closeProfileDrawer()"></i>
        </div>
        <div class="drawer-body">
            <div class="drawer-avatar"><i class="fas fa-user"></i></div>
            <div class="drawer-name" id="profile-name">Library User</div>
            <div class="drawer-mobile" id="profile-mobile">+XX XXXXXXXXXX</div>
            
            <div class="drawer-menu">
                <!-- Change Password redirects to index.html with a special flag -->
                <button class="btn btn-outline" onclick="openChangePassword()"><i class="fas fa-key"></i> Change Password</button>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="btn" style="background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.3); box-shadow: none;" onmouseover="this.style.background='var(--danger)'; this.style.color='#fff';" onmouseout="this.style.background='rgba(244, 63, 94, 0.1)'; this.style.color='var(--danger)';" onclick="showLogoutModal()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
        </div>
    </div>

    <!-- ✅ UNIVERSAL CONFIRMATION MODAL -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 class="modal-title" id="modal-title-text">Log Out</h3>
            <p class="modal-desc" id="modal-desc-text">Are you sure you want to log out of your account?</p>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn" id="modal-action-btn">Yes</button>
            </div>
        </div>
    </div>

    <header>
        <div class="flex align-center" style="gap: 12px;">
            <i class="fas fa-book-open" style="color: var(--accent2); font-size: 1.4rem; text-shadow: 0 0 10px var(--glow);"></i>
            <div class="header-logo-container">
                <div class="header-logo">Islamic Library</div>
                <div class="header-sub">by Shekh</div>
            </div>
        </div>
        <!-- ✅ THEME TOGGLE & PROFILE BUTTON -->
        <div class="flex align-center" style="gap: 20px;">
            <i id="theme-toggle-icon" class="fas fa-moon" style="font-size: 1.2rem; color: var(--text2); cursor: pointer; transition: 0.3s;" onclick="toggleTheme()" title="Switch Theme"></i>
            <i class="fas fa-user-circle" style="font-size: 1.3rem; color: var(--text2); cursor: pointer; transition: 0.3s;" onclick="openProfileDrawer()" title="Profile"></i>
        </div>
    </header>

    <div class="main-content">
        <div id="page-library">
            <h3 class="mb-2" style="font-size: 1.4rem;">My Library</h3>
            <div id="library-list"></div>
        </div>
    </div> 

    <!-- Bottom Nav -->
    <div id="bottom-nav" class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='index.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item active" onclick="window.location.href='library.html'"><i class="fas fa-book-reader"></i><span>Library</span></div>
        <a href="info.html" class="nav-item"><i class="fas fa-info-circle"></i><span>Info</span></a>
    </div>

    <script>
        // ✅ API URL HERE
        const API_URL = "https://script.google.com/macros/s/AKfycbwFOJPFMQXvgBQ34PpH4RKFBC0ERSvXwNPyj4jExXZLhtKQUJSoja4VqRRSL-EkqREC/exec"; 

        const userId = localStorage.getItem("islamic_user_id");
        let ebooksData = [];
        let userPayments = [];
        let apiLocks = {};

        // ✅ INITIALIZE THEME UI
        function initTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const icon = document.getElementById("theme-toggle-icon");
            if(icon) {
                icon.className = currentTheme === "light" ? "fas fa-sun" : "fas fa-moon";
            }
        }

        // ✅ TOGGLE THEME FUNCTION
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "light" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("islamic_theme", newTheme);
            initTheme();
        }

        // ✅ PROFILE DRAWER LOGIC (MATCHED WITH INFO.HTML)
        function openProfileDrawer() {
            document.getElementById("profile-name").innerText = localStorage.getItem("islamic_user_name") || "Library User";
            document.getElementById("profile-mobile").innerText = localStorage.getItem("islamic_user_mobile") || "Registered User";
            document.getElementById("drawer-overlay").classList.add("active");
            document.getElementById("profile-drawer").classList.add("active");
            // Prevent background scrolling
            document.body.style.overflow = 'hidden';
        }
        function closeProfileDrawer() {
            document.getElementById("drawer-overlay").classList.remove("active");
            document.getElementById("profile-drawer").classList.remove("active");
            // Restore background scrolling
            document.body.style.overflow = '';
        }

        // ✅ UNIVERSAL MODAL SYSTEM
        function closeModal() {
            document.getElementById("confirm-modal").classList.add("hidden");
        }

        function showLogoutModal() {
            closeProfileDrawer();
            document.getElementById("modal-title-text").innerText = "Log Out";
            document.getElementById("modal-desc-text").innerText = "Are you sure you want to log out of your account?";
            const actionBtn = document.getElementById("modal-action-btn");
            actionBtn.innerText = "Yes, Log Out";
            actionBtn.onclick = confirmLogout;
            document.getElementById("confirm-modal").classList.remove("hidden");
        }

        function openChangePassword() {
            closeProfileDrawer();
            document.getElementById("modal-title-text").innerText = "Change Password";
            document.getElementById("modal-desc-text").innerText = "You will be logged out securely to change your password. Continue?";
            const actionBtn = document.getElementById("modal-action-btn");
            actionBtn.innerText = "Yes, Continue";
            actionBtn.onclick = () => {
                closeModal();
                executeLogout(false); 
                // Set flag so index.html opens reset password tab directly
                sessionStorage.setItem("open_reset_tab", "true");
                window.location.href = "index.html"; 
            };
            document.getElementById("confirm-modal").classList.remove("hidden");
        }

        function confirmLogout() {
            executeLogout(true);
        }

        function executeLogout(redirect) {
            const userId = localStorage.getItem("islamic_user_id");
            if(userId) { 
                localStorage.removeItem(`cache_payments_${userId}_data`); 
                localStorage.removeItem(`cache_payments_${userId}_time`); 
            }
            localStorage.removeItem("islamic_user_id");
            localStorage.removeItem("islamic_user_name");
            localStorage.removeItem("islamic_user_mobile");
            if(redirect) window.location.href = "index.html";
        }

        // ✅ SWIPE GESTURE LOGIC (Right -> Home, Left -> Info)
        let touchstartX = 0; let touchstartY = 0; let touchendX = 0; let touchendY = 0;
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            touchendY = e.changedTouches[0].screenY;
            handleSwipe();
        }, {passive: true});
        
        function handleSwipe() {
            if (document.getElementById("profile-drawer").classList.contains("active")) return;
            if (Math.abs(touchendY - touchstartY) > 50) return; // Prevent vertical scroll trigger
            
            if (touchendX > touchstartX + 70) {
                window.location.href = 'index.html'; // Swipe Right
            } else if (touchendX < touchstartX - 70) {
                window.location.href = 'info.html'; // Swipe Left
            }
        }

        function showLoader() { document.getElementById("loader").classList.remove("hidden"); }
        function hideLoader() { document.getElementById("loader").classList.add("hidden"); }
        function showToast(msg, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = (type === "success" ? '<span style="font-size:1.1rem; color:var(--success)">✓</span>' : '<span style="font-size:1.1rem; color:var(--danger)">✕</span>') + ` <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.transform = "translateX(110%)"; toast.style.opacity = "0"; setTimeout(() => toast.remove(), 400); }, 3000);
        }

        async function apiCall(action, method = "GET", body = null, isBackground = false) {
            const url = `${API_URL}?action=${action}`;
            const options = { method: method };
            if (method === "POST" && body) { options.body = JSON.stringify(body); options.headers = { "Content-Type": "text/plain;charset=utf-8" }; }
            try {
                if (!isBackground) showLoader();
                const response = await fetch(url, options);
                const data = await response.json();
                if (!isBackground) hideLoader();
                return data;
            } catch (error) {
                if (!isBackground) hideLoader();
                if (!isBackground) showToast("Network Error", "error");
                return null;
            }
        }

        function fetchSWR(action, cacheKey, onDataChange, showBlockingLoader = false) {
            const now = new Date().getTime();
            const cachedDataStr = localStorage.getItem(cacheKey + "_data");
            const cachedTime = localStorage.getItem(cacheKey + "_time");
            let hasCache = false;
            
            if (cachedDataStr) {
                hasCache = true;
                try { onDataChange(JSON.parse(cachedDataStr)); } catch (e) { hasCache = false; }
            }

            if (cachedTime && (now - parseInt(cachedTime) < 4000)) {
                return; 
            }
            
            if (!hasCache && showBlockingLoader) showLoader();
            
            if (apiLocks[cacheKey]) return;
            apiLocks[cacheKey] = true;
            
            apiCall(action, "GET", null, true).then(freshData => {
                if (freshData) {
                    const freshDataStr = JSON.stringify(freshData);
                    if (cachedDataStr !== freshDataStr) {
                        localStorage.setItem(cacheKey + "_data", freshDataStr);
                        localStorage.setItem(cacheKey + "_time", now.toString());
                        onDataChange(freshData); 
                    } else { localStorage.setItem(cacheKey + "_time", now.toString()); }
                }
            }).finally(() => { 
                if (!hasCache && showBlockingLoader) hideLoader(); 
                delete apiLocks[cacheKey]; 
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            initTheme();
            loadLibrary();
        });

        function showLibrarySkeletons() {
            const container = document.getElementById("library-list");
            container.innerHTML = "";
            for(let i=0; i<4; i++) {
                container.innerHTML += `
                <div class="lib-card" style="cursor: default;">
                    <div class="skeleton" style="width: 75px; height: 75px; border-radius: var(--r);"></div>
                    <div class="lib-info" style="gap: 8px; display: flex; flex-direction: column; justify-content: center;">
                        <div class="skeleton" style="height: 14px; width: 70%; border-radius: 4px;"></div>
                        <div class="skeleton" style="height: 12px; width: 40%; border-radius: 4px;"></div>
                    </div>
                    <div class="skeleton" style="width: 30px; height: 30px; border-radius: 50%;"></div>
                </div>`;
            }
        }

        function isDataDifferent(oldData, newData) {
            if (!oldData || oldData.length !== newData.length) return true;
            for (let i = 0; i < newData.length; i++) {
                const oldItem = oldData.find(p => String(p.ebook_id) === String(newData[i].ebook_id));
                if (!oldItem || oldItem.status !== newData[i].status) {
                    return true;
                }
            }
            return false;
        }

        function loadLibrary() {
            const pendingSync = localStorage.getItem("sync_pending_payment");
            
            if (pendingSync) {
                const payload = JSON.parse(pendingSync);
                localStorage.removeItem("sync_pending_payment"); 
                
                const cachedPayments = localStorage.getItem(`cache_payments_${userId}_data`);
                if (cachedPayments) {
                    try { userPayments = JSON.parse(cachedPayments); } catch(e){}
                }
                
                fetchSWR("getEbooks", "cache_ebooks", (data) => {
                    if (Array.isArray(data)) { ebooksData = data; renderLibrary(); }
                }, false);

                apiCall("submitPayment", "POST", payload, true).then(res => {
                    if (res && res.success) {
                        setTimeout(() => {
                            localStorage.removeItem(`cache_payments_${userId}_time`); 
                            
                            fetchSWR(`getUserPayments&user_id=${userId}`, `cache_payments_${userId}`, (data) => {
                                if (Array.isArray(data)) { 
                                    if(isDataDifferent(userPayments, data)) {
                                        userPayments = data; 
                                        renderLibrary(); 
                                    } else {
                                        userPayments = data; 
                                    }
                                }
                            }, false);
                        }, 5000); 
                    }
                });

            } else {
                const cachedPayments = localStorage.getItem(`cache_payments_${userId}_data`);
                const cachedEbooks = localStorage.getItem("cache_ebooks_data");

                if (!cachedPayments || !cachedEbooks) {
                    showLibrarySkeletons();
                }

                fetchSWR(`getUserPayments&user_id=${userId}`, `cache_payments_${userId}`, (data) => {
                    if (Array.isArray(data)) {
                        if(isDataDifferent(userPayments, data)) {
                            userPayments = data;
                            renderLibrary();
                        } else {
                            userPayments = data;
                        }
                    }
                }, false);

                fetchSWR("getEbooks", "cache_ebooks", (data) => {
                    if (Array.isArray(data)) {
                        ebooksData = data;
                        renderLibrary();
                    }
                }, false);
            }
        }

        function renderLibrary() {
            if (ebooksData.length === 0) return; 

            const container = document.getElementById("library-list");
            container.innerHTML = "";

            if (!userPayments || userPayments.length === 0) {
                container.innerHTML = `<div class="text-center" style="margin-top: 60px; color:var(--text3); animation: fadeUp .5s ease both;">
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--glow2); border: 1px solid rgba(124,106,247,0.2); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 16px auto; color: var(--accent2);">📚</div>
                    <h4 style="font-family:'Syne', sans-serif; color:var(--text2); margin-bottom: 8px;">Library is empty</h4>
                    <p style="font-size: .85rem;">Your purchased or free books will appear here.</p>
                </div>`;
                return;
            }

            userPayments.forEach(pay => {
                const book = ebooksData.find(e => String(e.id) === String(pay.ebook_id));
                if(!book) return; 

                const statusLower = pay.status.toLowerCase();
                let badgeClass = "status-pending";
                if (statusLower === "approved") badgeClass = "status-approved";
                else if (statusLower === "rejected") badgeClass = "status-rejected";
                
                let actionBtn = "";
                if (statusLower === "approved") {
                    actionBtn = `<button class="btn" style="padding: 8px 16px; font-size:.8rem; border-radius: 99px; width:auto; background:var(--success); box-shadow: 0 4px 15px rgba(16,185,129,0.3); color:#fff;" onclick="window.open('${book.pdf_link}', '_blank')"><i class="fas fa-download"></i></button>`;
                } else if (statusLower === "rejected") {
                    actionBtn = `<span style="font-size: .75rem; color: var(--danger); font-weight: 600;">Failed</span>`; 
                } else {
                    actionBtn = `<span style="font-size: .75rem; color: var(--text3);"><i class="fas fa-hourglass-half spin" style="margin-right:4px;"></i> Verifying</span>`;
                }

                container.innerHTML += `
                <div class="lib-card">
                    <img src="${book.thumbnail}" class="lib-thumb">
                    <div class="lib-info">
                        <div style="font-size: .9rem; font-family:'Syne', sans-serif; font-weight:700; color:var(--text); margin-bottom:4px;">${book.title}</div>
                        <div class="status-badge ${badgeClass}">${pay.status.toUpperCase()}</div>
                    </div>
                    <div>${actionBtn}</div>
                </div>`;
            });
        }
    </script>
</body>
</html>
