    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg: #0a0a0f; --bg2: #0f0f18; --bg3: #13131e;
            --surface: #1a1a28; --surface2: #1f1f30; --surface3: #252538;
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
            --text: #f0f0f8; --text2: #a8a8c0; --text3: #686888;
            --accent: #7c6af7; --accent2: #9f91fa; --accent3: #c4bafe;
            --glow: rgba(124,106,247,0.25); --glow2: rgba(124,106,247,0.1);
            --danger: #f43f5e; --success: #10b981; --amber: #f59e0b;
            --r: 12px; --r2: 16px; --r3: 20px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4); --shadow2: 0 8px 40px rgba(0,0,0,0.5);
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }

        /* ===== LIGHT MODE VARIABLES ===== */
        [data-theme="light"] {
            --bg: #f4f6f8; --bg2: #e9ecef; --bg3: #dee2e6;
            --surface: #ffffff; --surface2: #f8f9fa; --surface3: #e9ecef;
            --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
            --text: #1a1b1e; --text2: #495057; --text3: #868e96;
            --accent: #6366f1; --accent2: #4f46e5; --accent3: #4338ca;
            --glow: rgba(99,102,241,0.15); --glow2: rgba(99,102,241,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.06); --shadow2: 0 8px 30px rgba(0,0,0,0.1);
        }
        
        [data-theme="light"] .blob { opacity: 0.5; }
        [data-theme="light"] header, [data-theme="light"] .bottom-nav { background: rgba(255, 255, 255, 0.9); border-bottom-color: rgba(0,0,0,0.1); border-top-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .profile-drawer { background: #fff; }
        /* 🔥 LIGHT MODE PASSWORD INPUT FIX 🔥 */
        [data-theme="light"] .custom-dark-input {
            background: var(--surface2) !important; /* Halka gray background */
            color: var(--text) !important;          /* Dark text color */
            border-color: var(--border2) !important;
        }
        [data-theme="light"] .custom-dark-input::placeholder {
            color: var(--text3) !important;         /* Dark placeholder */
        }

        /* ===== GLOBAL STYLES ===== */
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; min-height: 100vh; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s ease; }
        
        body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); opacity:0.4; }

        .hero-bg { position:fixed; inset:0; pointer-events:none; z-index:-2; background: radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,106,247,0.2) 0%,transparent 70%), radial-gradient(ellipse 50% 40% at 80% 60%,rgba(168,85,247,0.12) 0%,transparent 60%), radial-gradient(ellipse 40% 30% at 20% 70%,rgba(99,102,241,0.1) 0%,transparent 60%); }
        .hero-grid { position:fixed; inset:0; pointer-events:none; z-index:-1; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,black 40%,transparent 100%); opacity:0.6; }
        .blob { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; animation:blobFloat 8s ease-in-out infinite; z-index:-1; }
        .blob1 { width:400px; height:400px; background:rgba(124,106,247,0.18); top:-100px; left:-100px; animation-delay:0s; }
        .blob2 { width:350px; height:350px; background:rgba(168,85,247,0.12); bottom:-80px; right:-80px; animation-delay:3s; }

        h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }

        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,15,0.85); backdrop-filter: blur(5px); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--surface3); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s cubic-bezier(0.4,0,0.2,1) infinite; }

        .btn { background: linear-gradient(135deg, #7c6af7, #9f3fbf); color: #fff; border: none; padding: 14px 20px; border-radius: 99px; font-weight: 600; font-family: 'DM Sans', sans-serif; width: 100%; cursor: pointer; transition: var(--transition); font-size: 1rem; display: block; text-align: center; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(124,106,247,0.4); }
                /* 🔥 UNIVERSAL OUTLINE BUTTON GLOW FIX (Sabhi pages ke liye) 🔥 */
        .btn-outline { 
            background: transparent; 
            color: var(--text2); 
            border: 1px solid var(--border2); 
            padding: 10px 20px; 
            border-radius: 99px; 
            font-weight: 500; 
            font-size: .85rem; 
            transition: var(--transition); 
            cursor: pointer; 
            /* Yahan se 'box-shadow: none;' permanently hata diya gaya hai taaki original glow aaye */
        }
        
        .btn-outline:hover { 
            border-color: var(--accent); 
            color: var(--accent2); 
            background: var(--glow2); 
            transform: translateY(-2px); /* Hover par thoda sa upar uthega */
            box-shadow: 0 8px 30px rgba(124, 106, 247, 0.4); /* 🔥 Ekdum premium hover glow 🔥 */
        }

        /* ✅ LOGOUT CONFIRMATION MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,15,0.85); backdrop-filter: blur(5px); z-index: 99999; display: flex; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
        .modal-box { background: var(--surface); padding: 28px 24px; border-radius: var(--r3); width: 90%; max-width: 320px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow2); animation: cardIn 0.4s ease both; }
        .modal-title { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
        .modal-desc { font-size: 0.9rem; color: var(--text2); margin-bottom: 24px; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-actions button { flex: 1; padding: 12px; font-size: 0.9rem; }

        /* ===== SKELETON LOADERS ===== */
        .skeleton { background: linear-gradient(90deg, var(--surface3) 25%, var(--surface2) 50%, var(--surface3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* ✅ FIXED HEADER */

        }
        .header-logo-container { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        
        .header-logo {

            font-weight: 800; 
            /* Font apne aap screen ke hisaab se set hoga */
            font-size: clamp(1rem, 5vw, 1.25rem); 
            background: linear-gradient(135deg, var(--accent2), #c084fc); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            line-height: 1; 
            letter-spacing: -0.02em; 
            /* Text 2 line mein nahi tootega */

        .header-sub {

            font-size: .7rem; 
            font-weight: 500; 
            color: var(--accent2); 
            text-transform: uppercase;

            white-space: nowrap; 
        }

        
        .main-content { padding: 90px 20px 90px; max-width: 1400px; margin: 0 auto; animation: fadeIn .5s ease both; }
        
        /* ✅ PROFILE DRAWER UI */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10001; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(3px); }
        .drawer-overlay.active { opacity: 1; pointer-events: all; }
        
        .profile-drawer { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; height: 100dvh; background: var(--surface); z-index: 10002; box-shadow: -5px 0 30px rgba(0,0,0,0.5); transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .profile-drawer.active { right: 0; }
        
        .drawer-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0;}
        .drawer-header h3 { margin: 0; font-size: 1.2rem; }

        .drawer-menu .btn-outline i { width: 20px; text-align: center; font-size: 1.1rem; }
        
        .drawer-footer { padding: 20px; border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

        /* Library Specific */
        .lib-card { background: var(--surface2); border-radius: var(--r2); padding: 16px; margin-bottom: 16px; display: flex; gap: 16px; border: 1px solid var(--border); align-items: center; transition: all var(--transition); animation: cardIn .4s ease both; box-shadow: var(--shadow); }
        .lib-card:hover { border-color: var(--border2); transform: translateY(-2px); }
        .lib-thumb { width: 75px; height: 75px; border-radius: var(--r); object-fit: cover; border: 1px solid var(--border); }
        .lib-info { flex: 1; }
        /* 🔥 PREMIUM CAPSULE BADGES (Aligned with Book Details Page) 🔥 */
        .status-badge { 
            display: inline-flex; 
            align-items: center; 
            gap: 4px; 
            padding: 4px 12px; 
            border-radius: 99px; /* Pill Shape */
            font-family: 'DM Mono', monospace; 
            font-size: 0.80rem; 
            font-weight: 700; 
            margin-top: 6px;
        }
        
        .status-approved { 
            background: rgba(16, 185, 129, 0.15); 
            border: 1px solid rgba(16, 185, 129, 0.4); 
            color: var(--success); 
        }
        
        .status-pending { 
            background: rgba(245, 158, 11, 0.15); 
            border: 1px solid rgba(245, 158, 11, 0.4); 
            color: var(--amber); 
        }
        
        .status-rejected { 
            background: rgba(244, 63, 94, 0.15); 
            border: 1px solid rgba(244, 63, 94, 0.4); 
            color: var(--danger); 
        }

        /* 💡 LIGHT MODE FIX FOR LIBRARY BADGES */
        [data-theme="light"] .status-approved {
            background: #ecfdf5; border-color: #a7f3d0; color: #047857; 
        }
        [data-theme="light"] .status-pending {
            background: #fffbeb; border-color: #fde68a; color: #b45309; 
        }
        [data-theme="light"] .status-rejected {
            background: #fef2f2; border-color: #fecaca; color: #b91c1c; 
        }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 999; transition: background-color 0.3s ease, border-color 0.3s ease; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-size: .75rem; font-weight: 500; gap: 6px; cursor: pointer; flex: 1; height: 100%; transition: all var(--transition); text-decoration: none; }

        .nav-item.active { color: var(--accent2); }
        .nav-item.active i { background: var(--glow2); padding: 8px; border-radius: 50%; box-shadow: 0 0 15px var(--glow); transform: translateY(-4px); color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } } @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } } @keyframes slideUp { from { opacity: 0; transform: translateY(20px) translateX(110%); } to { opacity: 1; transform: translateX(0); } } @keyframes spin { to { transform: rotate(360deg); } } @keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,-20px) scale(1.05)} 66%{transform:translate(-15px,15px) scale(0.97)} }
        /* Custom Dark Input for Password Box */

                    const lastAnim = localStorage.getItem("banner_anim_time");

                    let pageKey = "home";
                    if (path.includes("/books")) pageKey = "books"; // 🔥 FIX HERE TOO

                    else if (path.includes("/info/terms")) pageKey = "terms";

                    else if (path.includes("/payments")) pageKey = "payments";
                    else if (path.includes("/login/support")) pageKey = "support";

window.initUserTierSystem = async function(userId) {
    if (!userId) return;

    let approvedCount = 0;
    const cachedTier = localStorage.getItem(`user_tier_${userId}`);
    
    // 1. CHEAPEST WAY: Check Permanent Cache First
    if (cachedTier) {
        approvedCount = parseInt(cachedTier);
        window.renderTierUI(approvedCount);
    } else {
        // 2. TOKEN EFFICIENT WAY: 1 Read Only from Firebase
        try {
            const { getFirestore, collection, query, where, getCountFromServer } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
            const dbInstance = getFirestore();
            const paymentsRef = collection(dbInstance, "payments");
            const q = query(paymentsRef, where("user_id", "==", userId), where("status", "==", "approved"));
            
            const snapshot = await getCountFromServer(q);
            approvedCount = snapshot.data().count;
            
            // Save permanently in cache so it never costs tokens again
            localStorage.setItem(`user_tier_${userId}`, approvedCount.toString());
            window.renderTierUI(approvedCount);
        } catch (error) {
            console.error("Error fetching tier count:", error);
        }
    }
};

window.renderTierUI = function(booksBought) {
    let tierName, tierClass, tierIcon, nextGoal, nextName, nextIcon;

    if (booksBought >= 5) {
        tierName = "Diamond Member"; tierClass = "tier-diamond"; tierIcon = "💎"; nextGoal = null;
    } else if (booksBought >= 3) {
        tierName = "Gold Member"; tierClass = "tier-gold"; tierIcon = "🥇"; nextGoal = 5; nextName = "Diamond"; nextIcon = "💎";
    } else if (booksBought >= 1) {
        tierName = "Silver Member"; tierClass = "tier-silver"; tierIcon = "🥈"; nextGoal = 3; nextName = "Gold"; nextIcon = "🥇";
    } else {
        tierName = "Explorer"; tierClass = "tier-explorer"; tierIcon = "🧭"; nextGoal = 1; nextName = "Silver"; nextIcon = "🥈";
    }

    // A. Inject Badge into Drawer
    const badgeContainer = document.getElementById("user-tier-container");
    if (badgeContainer) {
        badgeContainer.innerHTML = `
            <div class="user-tier-badge ${tierClass}" onclick="window.openTierModal()">
                ${tierIcon} ${tierName} <i class="fas fa-info-circle" style="margin-left: 4px;"></i>
            </div>
        `;
    }

    // B. Setup Modal Content safely (if modal exists on page)
    if(document.getElementById("modalTierIcon")) {
        document.getElementById("modalTierIcon").innerText = tierIcon;
        document.getElementById("modalTierTitle").innerText = `You are a ${tierName}`;
        
        if (nextGoal) {
            let booksNeeded = nextGoal - booksBought;
            document.getElementById("modalTierDesc").innerText = `You have purchased ${booksBought} book(s). Buy ${booksNeeded} more to unlock ${nextName}!`;
            let progressPercent = (booksBought / nextGoal) * 100;
            setTimeout(() => { document.getElementById("modalTierProgress").style.width = `${progressPercent}%`; }, 100);
            document.getElementById("modalCurrentBooks").innerText = `${booksBought} Books`;
            document.getElementById("modalNextGoal").innerText = `${nextGoal} for ${nextName} ${nextIcon}`;
        } else {
            document.getElementById("modalTierDesc").innerText = `You have unlocked the highest tier! Thank you for your immense support.`;
            setTimeout(() => { document.getElementById("modalTierProgress").style.width = `100%`; }, 100);
            document.getElementById("modalCurrentBooks").innerText = `${booksBought} Books`;
            document.getElementById("modalNextGoal").innerText = `Max Level`;
        }
    }
};

window.executeChangePassword = async function() {
    const newPass = document.getElementById("user_new_password").value.trim();
    const btn = document.getElementById("update-pass-btn");

    if (newPass.length < 6) {
        window.showToast("Password must be at least 6 characters!", "error");
        return;
    }

    // Firebase Auth se current user nikalo
    const { getAuth, updatePassword } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js");
    const auth = getAuth();
    const user = auth.currentUser;

    if (!user) {
        window.showToast("Session expired. Please login again.", "error");
        return;
    }

    try {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;

        // Password update command
        await updatePassword(user, newPass);
        
        window.showToast("Password updated successfully!", "success");
        window.closeChangePasswordModal();

    } catch (error) {
        console.error("Password Update Error:", error);
        
        // Agar user ne bohot time se login kiya hua hai toh ye error aayega
        if (error.code === 'auth/requires-recent-login') {
            window.showToast("Security alert: Please logout and login again to change your password.", "error");
        } else {
            window.showToast("Error: " + error.message, "error");
        }
    } finally {
        btn.innerHTML = 'Update Password';
        btn.disabled = false;
    }
}

            if (!cachedPayments) showToast("Network Error loading library", "error");
        }

        // 🔥 ONDEMAND SINGLE-BOOK SYNC FOR DIRECT LANDING LOOPS (Requirement 9)
        async function syncMissingBookDetails() {
            let megaIndex = [];
            try {
                const megaIndexStr = localStorage.getItem("cache_mega_search_index");
                if (megaIndexStr) megaIndex = JSON.parse(megaIndexStr);
            } catch(e) {}

            const fetchPromises = [];
            const freshMissingBooks = [];

            window.userPayments.forEach(pay => {
                const inMainCache = window.ebooksData.some(e => String(e.id) === String(pay.ebook_id));
                const inMegaCache = megaIndex.some(e => String(e.id) === String(pay.ebook_id));

                // Agar book dono local caches me nahi milti tabhi direct call jayega
                if (!inMainCache && !inMegaCache) {
                    const fetchSingleDoc = async () => {
                        try {
                            const bookSnap = await getDoc(doc(db, "ebooks", String(pay.ebook_id)));
                            if (bookSnap.exists()) {
                                freshMissingBooks.push({ id: bookSnap.id, ...bookSnap.data() });
                            }
                        } catch(err) { console.error("Error fetching single doc metadata:", err); }
                    };
                    fetchPromises.push(fetchSingleDoc());
                }
            });

            if (fetchPromises.length > 0) {
                await Promise.all(fetchPromises);
                if (freshMissingBooks.length > 0) {
                    window.ebooksData = [...window.ebooksData, ...freshMissingBooks];
                }
            }
        }

        // 🔒 THE GATEKEEPER: SECURE LIBRARY DOWNLOAD FUNCTION (1s Window Guard)
        // =========================================================================
        window.handleLibraryDownload = async (btnElement, ebookId) => {
            const currentUserId = localStorage.getItem("islamic_user_id");
            if (!currentUserId) return;

            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
            btnElement.disabled = true;
            
            // Premium text update
            showToast("Verifying your access... Please wait", "info");

            let liveStatus = "pending";

            try {
                const qPay = query(collection(db, "payments"), 
                    where("user_id", "==", currentUserId), 
                    where("ebook_id", "==", String(ebookId))
                );
                const paySnap = await getDocs(qPay);
                
                if (!paySnap.empty) liveStatus = paySnap.docs[0].data().status.toLowerCase();

                if (liveStatus !== "approved") {
                    let errorMsg = liveStatus === "rejected" 
                        ? "Access Denied! Your payment was rejected. Please contact support." 
                        : `Access Denied! Your payment status is currently ${liveStatus}.`;
                    
                    showToast(errorMsg, "error");
                    
                    const cacheKey = `cache_payments_${currentUserId}_data`;
                    let cachedPayments = JSON.parse(localStorage.getItem(cacheKey)) || [];
                    const pIndex = cachedPayments.findIndex(p => String(p.ebook_id) === String(ebookId));
                    if(pIndex > -1) {
                        cachedPayments[pIndex].status = liveStatus;
                    } else if (!paySnap.empty) {
                        cachedPayments.push({id: paySnap.docs[0].id, ...paySnap.docs[0].data()});
                    }
                    localStorage.setItem(cacheKey, JSON.stringify(cachedPayments));
                    window.userPayments = cachedPayments; 
                    
                    renderLibrary(); 
                    return; 
                }

                const secureDocSnap = await getDoc(doc(db, "secure_links", String(ebookId)));

                if (secureDocSnap.exists() && secureDocSnap.data().pdf_link) {
                    showToast("Access Verified! Opening Your Book...", "success"); 
                    
                    // 🔥 THE 1-SECOND WINDOW: User ko success toast dekhne ka moka milega!
                    setTimeout(() => {
                        window.open(secureDocSnap.data().pdf_link, "_blank");
                        // Link khulne ke baad loader/button wapas normal reset ho jaye background me
                        if (document.body.contains(btnElement)) {
                            btnElement.innerHTML = originalHTML;
                            btnElement.disabled = false;
                        }
                    }, 1000);
                    
                } else {
                    let fallbackBook = (window.ebooksData || []).find(e => String(e.id) === String(ebookId));
                    if (!fallbackBook) {
                        let mIndex = [];
                        try { mIndex = JSON.parse(localStorage.getItem("cache_mega_search_index") || "[]"); } catch(e){}
                        fallbackBook = mIndex.find(e => String(e.id) === String(ebookId));
                    }

                    if (fallbackBook && fallbackBook.pdf_link) {
                        showToast("Access Verified! Opening Your Book...", "success");
                        setTimeout(() => {
                            window.open(fallbackBook.pdf_link, "_blank");
                            if (document.body.contains(btnElement)) {
                                btnElement.innerHTML = originalHTML;
                                btnElement.disabled = false;
                            }
                        }, 1000);
                    } else {
                        showToast("Unable to load the book. Please contact Support.", "error"); 
                        btnElement.innerHTML = originalHTML;
                        btnElement.disabled = false;
                    }
                }
            } catch (err) {
                console.error("Verification Error:", err);
                showToast("Network error during verification.", "error"); 
                btnElement.innerHTML = originalHTML;
                btnElement.disabled = false;
            }
        };

                        if (bar) {
                            bar.classList.add("show-banner");
                            bar.dataset.version = data.announcement.version;
                        }
                        setTimeout(() => { document.body.classList.remove("instant-load"); }, 100);
                    });
                }
            }
        }
    }
} catch(e) {}

// ✅ 3. USER PANEL: Firebase se Master Categories aur Languages (60 Min Cache)
document.addEventListener("DOMContentLoaded", () => {
    setTimeout(async () => {
        try {
            const CACHE_TIME_LIMIT = 60 * 60 * 1000; // 60 Minutes
            const now = Date.now();
            const savedTime = localStorage.getItem('cache_time_settings');
            const savedDataStr = localStorage.getItem('cache_data_settings');

            let data;

            if (savedTime && savedDataStr && (now - parseInt(savedTime)) < CACHE_TIME_LIMIT) {
                data = JSON.parse(savedDataStr); 
            } else {
                const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                const dbInstance = getFirestore();
                const docRef = doc(dbInstance, "settings", "app_data");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    data = docSnap.data();
                    localStorage.setItem('cache_data_settings', JSON.stringify(data));
                    localStorage.setItem('cache_time_settings', now.toString());
                }
            }

            if (data) {
                // 1. Categories Dropdown update
                if (data.categories) {
                    const catContainer = document.getElementById('cat-options');
                    if (catContainer) {
                        data.categories.forEach(cat => {
                            const lowerCat = cat.toLowerCase();
                            const exists = Array.from(catContainer.children).some(el => el.innerText.trim().toLowerCase() === lowerCat);
                            if (!exists) {
                                const newDiv = document.createElement('div');
                                newDiv.className = 'f-option'; newDiv.innerText = cat; 
                                newDiv.onclick = (e) => window.setCatFilter(lowerCat, cat, e);
                                catContainer.appendChild(newDiv);
                            }
                        });
                    }
                }

                // 2. Languages Dropdown update
                if (data.languages) {
                    const langContainer = document.getElementById('lang-options');
                    if (langContainer) {
                        data.languages.forEach(lang => {
                            const lowerLang = lang.toLowerCase();
                            const exists = Array.from(langContainer.children).some(el => el.innerText.trim().toLowerCase() === lowerLang);
                            if (!exists) {
                                const newDiv = document.createElement('div');
                                newDiv.className = 'f-option'; newDiv.innerText = lang; 
                                newDiv.onclick = (e) => window.setLangFilter(lowerLang, lang, e);
                                langContainer.appendChild(newDiv);
                            }
                        });
                    }
                }

                // 3. ANNOUNCEMENT BANNER LOGIC (First-time Animation Control)
                if (data.announcement && data.announcement.is_active && data.announcement.show_on.includes(currentPageName)) {
                    const annData = data.announcement;
                    const closedVer = localStorage.getItem("closed_banner_version");
                    if (closedVer !== String(annData.version)) {
                        const bar = document.getElementById("premium-announcement-bar");
                        
                        const textEl = document.getElementById("ann-text");
                        if (textEl && textEl.innerText === "") textEl.innerText = annData.text;
                        
                        const linkEl = document.getElementById("ann-link");
                        if (linkEl && !linkEl.getAttribute("href").includes("http")) {
                            if (annData.link_url) {
                                linkEl.href = annData.link_url; linkEl.target = "_blank"; linkEl.style.pointerEvents = "auto";
                            } else {
                                linkEl.href = "javascript:void(0)"; linkEl.removeAttribute("target"); linkEl.style.pointerEvents = "none";
                            }
                        }
                        
                        if (bar) bar.dataset.version = annData.version;

                        const lastAnim = localStorage.getItem("banner_anim_time");
                        if (!lastAnim || (now - parseInt(lastAnim)) > (30 * 60 * 1000)) {
                            setTimeout(() => {
                                document.body.classList.add("banner-opened");
                                if (bar) bar.classList.add("show-banner"); 
                                localStorage.setItem("banner_anim_time", Date.now().toString());
                            }, 1000);
                        }
                    }
                }

            }
        } catch (error) { console.error("User Panel Master Tags Load Error:", error); }
    }, 500); 
});

// 🔴 GLOBAL CLOSE AND UNDO MANAGEMENT
let undoTimeout;
window.closeAnnouncement = function() {
    const bar = document.getElementById("premium-announcement-bar");
    if (!bar) return;
    
    localStorage.setItem("closed_banner_version", bar.dataset.version);
    bar.classList.add("closed");
    document.body.classList.remove("banner-opened");
    
    const toast = document.getElementById("ann-undo-toast");
    if (toast) {
        toast.classList.remove("hidden");
        setTimeout(() => toast.classList.add("show"), 10);
    }
    
    undoTimeout = setTimeout(() => {
        if (toast) {
            toast.classList.remove("show");
            setTimeout(() => toast.classList.add("hidden"), 400); 
        }
    }, 4000);
};

window.undoAnnouncement = function() {
    clearTimeout(undoTimeout);
    localStorage.removeItem("closed_banner_version"); 
    
    const bar = document.getElementById("premium-announcement-bar");
    if (bar) bar.classList.remove("closed");
    document.body.classList.add("banner-opened");
    
    const toast = document.getElementById("ann-undo-toast");
    if (toast) {
        toast.classList.remove("show");
        setTimeout(() => toast.classList.add("hidden"), 400);
    }
};

    </script>
