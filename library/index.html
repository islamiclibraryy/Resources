        /* ===== CSS VARIABLES ===== */
        :root {
            --bg: #0a0a0f; --bg2: #0f0f18; --bg3: #13131e;

            --glow: rgba(124,106,247,0.25); --glow2: rgba(124,106,247,0.1);
            --danger: #f43f5e; --success: #10b981; --amber: #f59e0b;
            --r: 12px; --r2: 16px; --r3: 20px;

            --surface: #ffffff; --surface2: #f8f9fa; --surface3: #e9ecef;
            --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
            --text: #1a1b1e; --text2: #495057; --text3: #868e96;
            --accent: #6366f1; --accent2: #4f46e5; --accent3: #4338ca;
            --glow: rgba(99,102,241,0.15); --glow2: rgba(99,102,241,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.06); --shadow2: 0 8px 30px rgba(0,0,0,0.1);

        [data-theme="light"] .blob { opacity: 0.5; }

        }
        [data-theme="light"] .custom-dark-input::placeholder {
            color: var(--text3) !important;         /* Dark placeholder */
        }

        /* ===== GLOBAL STYLES ===== */
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

        body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); opacity:0.4; }

        .hero-bg { position:fixed; inset:0; pointer-events:none; z-index:-2; background: radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,106,247,0.2) 0%,transparent 70%), radial-gradient(ellipse 50% 40% at 80% 60%,rgba(168,85,247,0.12) 0%,transparent 60%), radial-gradient(ellipse 40% 30% at 20% 70%,rgba(99,102,241,0.1) 0%,transparent 60%); }
        .hero-grid { position:fixed; inset:0; pointer-events:none; z-index:-1; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:48px 48px; mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,black 40%,transparent 100%); opacity:0.6; }

        h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }

        .spinner { width: 50px; height: 50px; border: 4px solid var(--surface3); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s cubic-bezier(0.4,0,0.2,1) infinite; }

        .btn { background: linear-gradient(135deg, #7c6af7, #9f3fbf); color: #fff; border: none; padding: 14px 20px; border-radius: 99px; font-weight: 600; font-family: 'DM Sans', sans-serif; width: 100%; cursor: pointer; transition: var(--transition); font-size: 1rem; display: block; text-align: center; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(124,106,247,0.4); }
                /* 🔥 UNIVERSAL OUTLINE BUTTON GLOW FIX (Sabhi pages ke liye) 🔥 */
        .btn-outline { 
            background: transparent; 
            color: var(--text2); 
            border: 1px solid var(--border2); 
            padding: 10px 20px; 
            border-radius: 99px; 
            font-weight: 500; 
            font-size: .85rem; 
            transition: var(--transition); 
            cursor: pointer;

        }
        
        .btn-outline:hover { 
            border-color: var(--accent); 
            color: var(--accent2); 
            background: var(--glow2); 
            transform: translateY(-2px); /* Hover par thoda sa upar uthega */

        /* ✅ LOGOUT CONFIRMATION MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,15,0.85); backdrop-filter: blur(5px); z-index: 99999; display: flex; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }

        /* ✅ PROFILE DRAWER UI */

        .profile-drawer { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; height: 100dvh; background: var(--surface); z-index: 10002; box-shadow: -5px 0 30px rgba(0,0,0,0.5); transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }

        .drawer-menu .btn-outline i { width: 20px; text-align: center; font-size: 1.1rem; }
        
        .drawer-footer { padding: 20px; border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

        /* Library Specific */
        .lib-card { background: var(--surface2); border-radius: var(--r2); padding: 16px; margin-bottom: 16px; display: flex; gap: 16px; border: 1px solid var(--border); align-items: center; transition: all var(--transition); animation: cardIn .4s ease both; box-shadow: var(--shadow); }
        .lib-card:hover { border-color: var(--border2); transform: translateY(-2px); }
        .lib-thumb { width: 75px; height: 75px; border-radius: var(--r); object-fit: cover; border: 1px solid var(--border); }
        .lib-info { flex: 1; }
        .status-badge { font-size: .7rem; padding: 4px 10px; border-radius: 99px; font-weight: 600; display: inline-block; margin-top: 6px; letter-spacing: 0.05em; font-family: 'DM Mono', monospace; }

        .status-rejected { background: rgba(244, 63, 94, 0.15); border: 1px solid rgba(244, 63, 94, 0.3); color: var(--danger); }

        .nav-item i { font-size: 1.2rem; transition: all var(--transition); }
        .nav-item.active { color: var(--accent2); }
        .nav-item.active i { background: var(--glow2); padding: 8px; border-radius: 50%; box-shadow: 0 0 15px var(--glow); transform: translateY(-4px); color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } } @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } } @keyframes slideUp { from { opacity: 0; transform: translateY(20px) translateX(110%); } to { opacity: 1; transform: translateX(0); } } @keyframes spin { to { transform: rotate(360deg); } } @keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(20px,-20px) scale(1.05)} 66%{transform:translate(-15px,15px) scale(0.97)} }

        function showLibrarySkeletons() {

                    </div>
                    <div class="skeleton" style="width: 30px; height: 30px; border-radius: 50%;"></div>
                </div>`;
            }
        }

        function isDataDifferent(oldData, newData) {
            if (!oldData || oldData.length !== newData.length) return true;
            for (let i = 0; i < newData.length; i++) {
                const oldItem = oldData.find(p => String(p.ebook_id) === String(newData[i].ebook_id));
                if (!oldItem || oldItem.status !== newData[i].status) {
                    return true;
                }
            }
            return false;
        }
// ✅ UNIVERSAL TOAST SYSTEM FOR LIBRARY PAGE
function showToast(msg, type = "success") {
    const container = document.getElementById("toast-container");
    if (!container) return; // Safety check agar container na mile

    const toast = document.createElement("div"); 
    toast.className = "toast";
    
    // Icon aur design tumhare purane format ke hisab se
    toast.innerHTML = (type === "success" ? '<span style="font-size:1.1rem; color:var(--success)">✓</span>' : '<span style="font-size:1.1rem; color:var(--danger)">✕</span>') + ` <span>${msg}</span>`;
    
    container.appendChild(toast);
    
    // Temporary basic animation jab tak final CSS nahi likhte
    setTimeout(() => { 
        toast.style.transform = "translateX(110%)"; 
        toast.style.opacity = "0"; 
        setTimeout(() => toast.remove(), 400); 
    }, 3000);
}

        // ✅ 3. FIREBASE FETCH (Crash-Proof & Safe State)
        async function fetchLibraryData() {
            const currentUserId = localStorage.getItem("islamic_user_id");
            if (!currentUserId) {
                renderLibrary();
                return;
            }

            const cachedPayments = localStorage.getItem(`cache_payments_${currentUserId}_data`);
            const cachedTime = localStorage.getItem(`cache_payments_${currentUserId}_time`);
            const cachedEbooks = localStorage.getItem("cache_ebooks_data");
            const CACHE_TIME_LIMIT = 5 * 60 * 1000; 
            const now = Date.now();

            // Skeletons dikhao agar cache nahi hai
            if (!cachedPayments || !cachedEbooks) {
                showLibrarySkeletons();
            } else {
                try {
                    // Safe Initialization taaki undefined error na aaye
                    window.userPayments = JSON.parse(cachedPayments) || [];
                    window.ebooksData = JSON.parse(cachedEbooks) || [];
                    renderLibrary();
                } catch(e) {
                    window.userPayments = []; 
                    window.ebooksData = [];
                }
            }

            // Gatekeeper: Agar 5 minute nahi hue, toh yahi ruk jao
            if (cachedTime && cachedPayments && (now - parseInt(cachedTime)) < CACHE_TIME_LIMIT) {
                return; 
            }

            try {
                const { getFirestore, collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                const db = getFirestore();

                const q = query(collection(db, "payments"), where("user_id", "==", currentUserId));
                const paySnapshot = await getDocs(q);
                const freshPayments = paySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                const bookSnapshot = await getDocs(collection(db, "ebooks"));
                const freshEbooks = bookSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // Agar data change hua hai toh update karo
                if (isDataDifferent(window.userPayments, freshPayments) || JSON.stringify(window.ebooksData) !== JSON.stringify(freshEbooks)) {
                    window.userPayments = freshPayments;
                    window.ebooksData = freshEbooks;
                    localStorage.setItem(`cache_payments_${currentUserId}_data`, JSON.stringify(freshPayments));
                    localStorage.setItem("cache_ebooks_data", JSON.stringify(freshEbooks));
                    renderLibrary();
                }

                localStorage.setItem(`cache_payments_${currentUserId}_time`, now.toString());

            } catch(e) {
                console.error("Firebase fetch error:", e);
                // 🔥 FIX: window.showToast hata kar sirf showToast kar diya hai
                if (!cachedPayments) {
                    try { showToast("Network Error loading library", "error"); } catch(err){}
                }
            }
        }

        // ✅ 4. RENDER LIBRARY (Blank Page Issue Fixed)
        function renderLibrary() {
            const container = document.getElementById("library-list");
            if (!container) return; // Safety check
            
            container.innerHTML = "";
            const currentUserId = localStorage.getItem("islamic_user_id");

            // 🔥 GUEST UI STATE
            if (!currentUserId) {
                container.innerHTML = `
                <div class="premium-lock-container">
                    <div class="premium-lock-icon"><i class="fas fa-lock"></i></div>
                    <h4 class="premium-lock-title">Login Required</h4>
                    <p class="premium-lock-desc">Please login to access your personal library and view your purchased books.</p>
                    <button class="btn premium-lock-btn" onclick="window.location.href='/login/'">
                        <i class="fas fa-sign-in-alt"></i> Login to Access
                    </button>
                </div>`;
                return;
            }

            // Safe Arrays (Crash hone se bachayega)
            const paymentsArray = window.userPayments || [];
            const ebooksArray = window.ebooksData || [];

            // Normal Empty Library State
            if (ebooksArray.length === 0 || paymentsArray.length === 0) {
                container.innerHTML = `<div class="text-center" style="margin-top: 60px; color:var(--text3); animation: fadeUp .5s ease both;">
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--glow2); border: 1px solid rgba(124,106,247,0.2); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 16px auto; color: var(--accent2);">📚</div>
                    <h4 style="font-family:'Syne', sans-serif; color:var(--text2); margin-bottom: 8px;">Library is empty</h4>
                    <p style="font-size: .85rem;">Your purchased books will appear here.</p>
                </div>`;
                return;
            }

            paymentsArray.forEach(pay => {
                const book = ebooksArray.find(e => String(e.id) === String(pay.ebook_id));
                if(!book) return; 

                const statusLower = pay.status.toLowerCase();
                let badgeClass = "status-pending";
                if (statusLower === "approved") badgeClass = "status-approved";
                else if (statusLower === "rejected") badgeClass = "status-rejected";
                
                let actionBtn = "";
                if (statusLower === "approved") {
                    actionBtn = `<button class="btn" style="padding: 8px 16px; font-size:.8rem; border-radius: 99px; width:auto; background:var(--success); box-shadow: 0 4px 15px rgba(16,185,129,0.3); color:#fff;" onclick="window.handleLibraryDownload(this, '${book.id}')"><i class="fas fa-download"></i></button>`;
                } else if (statusLower === "rejected") {
                    actionBtn = `<span style="font-size: .75rem; color: var(--danger); font-weight: 600;">Failed</span>`; 
                } else {
                    actionBtn = `<span style="font-size: .75rem; color: var(--text3);"><i class="fas fa-hourglass-half spin" style="margin-right:4px;"></i> Verifying</span>`;
                }

                container.innerHTML += `
                <div class="lib-card">
                    <img src="${book.thumbnail}" class="lib-thumb">
                    <div class="lib-info">
                        <div style="font-size: .9rem; font-family:'Syne', sans-serif; font-weight:700; color:var(--text); margin-bottom:4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">${book.title}</div>
                        <div class="status-badge ${badgeClass}">${pay.status.toUpperCase()}</div>
                    </div>
                    <div>${actionBtn}</div>
                </div>`;
            });
        }

        // =========================================================================
        // 🔒 5. THE GATEKEEPER: SECURE LIBRARY DOWNLOAD FUNCTION 
        // =========================================================================
        window.handleLibraryDownload = async (btnElement, ebookId) => {
            const currentUserId = localStorage.getItem("islamic_user_id");
            if (!currentUserId) return;

            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
            btnElement.disabled = true;
            
            // 🔥 FIX: window.showToast -> showToast kar diya gaya hai
            showToast("Verifying live access...", "info");

            let liveStatus = "pending";

            try {
                const { getFirestore, doc, getDoc, collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                const dbInstance = getFirestore();

                const qPay = query(collection(dbInstance, "payments"), 
                    where("user_id", "==", currentUserId), 
                    where("ebook_id", "==", String(ebookId))
                );
                const paySnap = await getDocs(qPay);
                
                if (!paySnap.empty) liveStatus = paySnap.docs[0].data().status.toLowerCase();

                if (liveStatus !== "approved") {
                    let errorMsg = liveStatus === "rejected" 
                        ? "Access Denied! Your payment was rejected. Please contact support." 
                        : `Access Denied! Your payment is currently ${liveStatus}.`;
                    
                    showToast(errorMsg, "error"); // 🔥 FIX
                    
                    const cacheKey = `cache_payments_${currentUserId}_data`;
                    let cachedPayments = JSON.parse(localStorage.getItem(cacheKey)) || [];
                    const pIndex = cachedPayments.findIndex(p => String(p.ebook_id) === String(ebookId));
                    if(pIndex > -1) {
                        cachedPayments[pIndex].status = liveStatus;
                    } else if (!paySnap.empty) {
                        cachedPayments.push({id: paySnap.docs[0].id, ...paySnap.docs[0].data()});
                    }
                    localStorage.setItem(cacheKey, JSON.stringify(cachedPayments));
                    window.userPayments = cachedPayments; 
                    
                    renderLibrary(); 

                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);

                    return; 
                }

                const secureDocRef = doc(dbInstance, "secure_links", String(ebookId));
                const secureDocSnap = await getDoc(secureDocRef);

                if (secureDocSnap.exists() && secureDocSnap.data().pdf_link) {
                    showToast("Access Verified! Opening File...", "success"); // 🔥 FIX
                    window.open(secureDocSnap.data().pdf_link, "_blank");
                } else {
                    const fallbackBook = (window.ebooksData || []).find(e => String(e.id) === String(ebookId));
                    if (fallbackBook && fallbackBook.pdf_link) {
                        window.open(fallbackBook.pdf_link, "_blank");
                    } else {
                        showToast("Secure file not found. Please contact admin.", "error"); // 🔥 FIX
                    }
                }
            } catch (err) {
                console.error("Verification Error:", err);
                showToast("Network error during verification.", "error"); // 🔥 FIX
            } finally {
                if (document.body.contains(btnElement) && liveStatus === "approved") {
                    btnElement.innerHTML = originalHTML;
                    btnElement.disabled = false;
                }
            }
        };

    </script>
